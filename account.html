<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Account — BirdieBuddy</title>
<!-- bb-favicon-og -->
<link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/img/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/img/apple-touch-icon.png">
<meta property="og:type" content="website">
<meta property="og:site_name" content="BirdieBuddy">
<meta property="og:title" content="BirdieBuddy — Golf's best-kept secret.">
<meta property="og:description" content="A fifteen-agent prediction engine for PGA Tour tournaments. Ten factors. Ten thousand simulations. One edge, every week.">
<meta property="og:image" content="https://birdiebuddy.io/assets/img/og-image.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://birdiebuddy.io/assets/img/og-image.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/design-system.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <style>
    .acct-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:var(--space-5)}
    @media(max-width:880px){.acct-grid{grid-template-columns:1fr}}
    .acct-card{background:var(--surface-3);border:1px solid var(--border-base);
      border-radius:var(--radius-xl);padding:var(--space-6)}
    .acct-card h2{font-size:var(--fs-md);color:var(--text-primary);font-weight:700;
      margin-bottom:var(--space-4)}
    .kv{display:flex;justify-content:space-between;padding:11px 0;
      border-bottom:1px solid var(--border-soft);font-size:var(--fs-sm)}
    .kv:last-child{border:0}
    .kv span{color:var(--text-muted)}
    .kv strong{color:var(--text-primary);font-weight:600}
    .plan-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;
      border-radius:var(--radius-full);font-weight:700;font-size:var(--fs-xs);
      border:1px solid var(--border-gold);background:rgba(212,168,67,.08)}
    .plan-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:var(--space-5)}
    .upsell{margin-top:var(--space-4);padding:var(--space-4);border-radius:var(--radius-lg);
      background:linear-gradient(135deg,rgba(212,168,67,.10),transparent);
      border:1px solid var(--border-gold);font-size:var(--fs-xs);color:var(--text-body)}
    .danger{color:var(--negative)}
    .signed-out{max-width:440px;margin:var(--space-12) auto;text-align:center}
    .signed-out .btn{margin:0 6px}
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="container">
    <header class="page-head">
      <div class="eyebrow">Account</div>
      <h1>Your BirdieBuddy account</h1>
      <p>Manage your plan, billing, and sign-in. Upgrades take effect immediately.</p>
    </header>

    <div id="acctMount"></div>
  </main>

  <div id="site-footer"></div>

  <script src="assets/js/core.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/animations.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await BBI.renderHeader('account.html');
      await BBI.renderFooter();
      const mount = document.getElementById('acctMount');
      const T = BBI.auth.TIERS;

      const esc = s => String(s ?? '').replace(/[&<>"]/g,
        c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

      const render = () => {
        const u = BBI.auth.user();
        if (!u) {
          mount.innerHTML = `
            <div class="signed-out">
              <h2 class="h-3" style="margin-bottom:var(--space-3)">You're not signed in</h2>
              <p class="muted" style="margin-bottom:var(--space-6)">Sign in to manage your plan, or create a free account to get started.</p>
              <button class="btn btn-primary btn-lg" id="soLogin">Sign in</button>
              <button class="btn btn-ghost btn-lg" id="soSignup">Create account</button>
            </div>`;
          document.getElementById('soLogin').onclick = () => BBI.auth.openLogin();
          document.getElementById('soSignup').onclick = () => BBI.auth.openSignup();
          return;
        }
        const t = T[u.tier] || T.free;
        const nextTier = { free:'pro', pro:'all_access', all_access:'sharp', sharp:null }[u.tier];
        mount.innerHTML = `
          <div class="acct-grid">
            <div class="acct-card">
              <h2>Plan</h2>
              <div class="plan-row">
                <span class="plan-badge" style="color:${t.accent}">${t.name}</span>
                <span class="muted" style="font-size:var(--fs-xs);align-self:center">${t.tagline}</span>
              </div>
              <div class="plan-row">
                ${nextTier ? `<button class="btn btn-primary" id="upgrade">Upgrade to ${T[nextTier].name}</button>` : `<span class="badge badge-gold">Top tier — thank you</span>`}
                ${u.tier!=='free' ? `<button class="btn btn-ghost" id="billing">Manage billing</button>` : ''}
                <a class="btn btn-ghost" href="pricing.html">Compare all plans</a>
              </div>
              ${nextTier ? `<div class="upsell"><strong>${T[nextTier].name}</strong> adds: ${T[nextTier].features[1] || T[nextTier].features[0]}.</div>` : ''}
              <div style="margin-top:var(--space-6)">
                <h2>What you get on ${t.name}</h2>
                <div class="stack-sm">${t.features.map(f=>`<div class="kv"><span>✓</span><strong style="font-weight:500">${f}</strong></div>`).join('')}</div>
              </div>
            </div>

            <div>
              <div class="acct-card">
                <h2>Profile</h2>
                <div class="kv"><span>Name</span><strong>${esc(u.name||'—')}</strong></div>
                <div class="kv"><span>Email</span><strong>${esc(u.email)}</strong></div>
                <div class="kv"><span>Current plan</span><strong style="color:${t.accent}">${t.name}</strong></div>
                <div class="kv"><span>Status</span><strong class="positive">Active</strong></div>
              </div>
              <div class="acct-card" style="margin-top:var(--space-5)">
                <h2>Discord</h2>
                <p class="muted" style="font-size:var(--fs-xs);margin-bottom:var(--space-4)">
                  Link your Discord to unlock the member server — you'll get the ${t.name} channels automatically.</p>
                <button class="btn btn-primary btn-block" id="linkDiscord">Connect Discord</button>
                <div id="discordMsg" style="margin-top:10px;font-size:var(--fs-xs)"></div>
              </div>
              <div class="acct-card" style="margin-top:var(--space-5)">
                <h2>Session</h2>
                <p class="muted" style="font-size:var(--fs-xs);margin-bottom:var(--space-4)">
                  Demo mode: your account lives in this browser only. Connect the backend for real auth + billing.</p>
                <button class="btn btn-ghost btn-block" id="signout">Sign out</button>
                <button class="btn btn-block danger" id="downgrade"
                  style="margin-top:10px;border:1px solid var(--border-soft)">Cancel &amp; return to Free</button>
              </div>
            </div>
          </div>`;

        const up = document.getElementById('upgrade');
        if (up) up.onclick = () => BBI.auth.subscribe(nextTier, 'year');
        const bl = document.getElementById('billing');
        if (bl) bl.onclick = () => BBI.auth.manageBilling();
        document.getElementById('signout').onclick = () => BBI.auth.logout();
        document.getElementById('downgrade').onclick = () => {
          if (confirm('Cancel your plan and return to Free?')) BBI.auth.subscribe('free', 'year');
        };

        // --- Discord link ---
        const ld = document.getElementById('linkDiscord');
        if (ld) ld.onclick = async () => {
          ld.disabled = true; ld.textContent = 'Connecting…';
          try {
            const token = await BBI.auth.backend.accessToken();
            if (!token) throw new Error('no_session');
            const API = BBI.auth.API_BASE || 'https://vercel-app-beige-psi.vercel.app';
            const r = await fetch(`${API}/api/discord/login`, { headers: { Authorization: `Bearer ${token}` } });
            const j = await r.json();
            if (j.url) { window.location = j.url; return; }
            throw new Error(j.message || j.error || 'failed');
          } catch (e) {
            ld.disabled = false; ld.textContent = 'Connect Discord';
            document.getElementById('discordMsg').innerHTML =
              `<span class="danger">Couldn't start linking — make sure you're signed in, then try again.</span>`;
          }
        };
        // feedback after the OAuth round-trip
        const ds = new URLSearchParams(location.search).get('discord');
        const dmsg = document.getElementById('discordMsg');
        if (ds && dmsg) {
          const m = {
            ok:          ['positive', '✓ Discord linked and your role is set — head to the server!'],
            linked_join: ['',         "✓ Linked! You haven't joined the server yet — join and your role applies automatically."],
            denied:      ['muted',    'Linking canceled.'],
          }[ds] || ['danger', "Linking didn't complete. Try again, or reach out in #help-and-support."];
          dmsg.innerHTML = `<span class="${m[0]}">${m[1]}</span>`;
        }
      };

      BBI.auth.onChange(render);
      render();
    });
  </script>
</body>
</html>
