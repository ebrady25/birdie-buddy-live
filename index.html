const getBmiColor = (bmi) => {
  if (bmi >= 0.5) return C.gold;
  if (bmi >= 0.35) return C.green;
  if (bmi >= 0.25) return C.blue;
  if (bmi >= 0.2) return C.cyan;
  return C.textMuted;
};

const getLevColor = (lev) => {
  if (lev >= 1.0) return C.gold;
  if (lev >= 0.5) return C.green;
  if (lev >= 0.2) return C.textDim;
  return C.red;
};

const getValueColor = (v) => {
  if (v >= 0.6) return C.gold;
  if (v >= 0.45) return C.green;
  if (v >= 0.35) return C.cyan;
  if (v >= 0.25) return C.blue;
  return C.textMuted;
};

const formatSalary = (sal) => `$${(sal / 1000).toFixed(1)}K`;

const PlayerCard = ({ player, isSelected, onClick, mode, sortKey }) => {
  const bmi = mode === "pool" ? player.pb : player.db;
  const rank = mode === "pool" ? player.pr : player.dr;
  const own = mode === "pool" ? player.op : player.od;
  const showValue = sortKey === "value";

  return (
    <div
      onClick={onClick}
      style={{
        background: isSelected ? C.cardHover : C.card,
        border: `1px solid ${isSelected ? C.gold : C.border}`,
        borderRadius: 8,
        padding: "10px 14px",
        cursor: "pointer",
        transition: "all 0.2s ease",
        display: "flex",
        alignItems: "center",
        gap: 12,
        minHeight: 52,
      }}
    >
      <div style={{ width: 28, height: 28, borderRadius: "50%", background: showValue ? getValueColor(player.vs) : getBmiColor(bmi), display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 800, color: "#000", flexShrink: 0 }}>
        {rank}
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: C.text, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{player.n}</div>
        <div style={{ fontSize: 10, color: C.textMuted, marginTop: 1 }}>
          {(() => {
            const live = LIVE && LIVE[player.n];
            const liveTag = live ? `⛳ ${live.sc >= 0 ? "+" : ""}${live.sc} (${live.thru})` : "";
            const base = showValue ? `${formatSalary(player.sal)} · DG #${player.dg} · ${own}% own` : `DG #${player.dg} · ${formatSalary(player.sal)} · ${own}% own`;
            return liveTag ? `${liveTag} · ${base}` : base;
          })()}
        </div>
      </div>
      <div style={{ textAlign: "right", flexShrink: 0 }}>
        {showValue ? (
          <>
            <div style={{ fontSize: 16, fontWeight: 800, color: getValueColor(player.vs), fontFamily: "'JetBrains Mono', monospace" }}>{player.vs.toFixed(3)}</div>
            <div style={{ fontSize: 9, color: C.textMuted, marginTop: 1 }}>VALUE</div>
          </>
        ) : (
          <>
            <div style={{ fontSize: 16, fontWeight: 800, color: getBmiColor(bmi), fontFamily: "'JetBrains Mono', monospace" }}>{bmi.toFixed(3)}</div>
            <div style={{ fontSize: 9, color: C.textMuted, marginTop: 1 }}>BBI</div>
          </>
        )}
      </div>
    </div>
  );
};

const CourseHistory = ({ playerName }) => {
  const entries = HIST[playerName] || [];
  if (entries.length === 0) return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: 20, marginTop: 16 }}>
      <div style={{ fontSize: 12, fontWeight: 700, color: C.textDim, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>📍 Muirfield Village Golf Club Course History</div>
      <div style={{ fontSize: 12, color: C.textMuted, fontStyle: "italic" }}>No Phoenix Open history on record — first appearance or limited data</div>
    </div>
  );

  const made = entries.filter(e => e.mc);
  const avgToPar = made.length > 0 ? made.reduce((a, e) => a + e.tp, 0) / made.length : 0;
  const avgSgTotal = made.length > 0 ? made.reduce((a, e) => a + e.st, 0) / made.length : 0;
  const cutRate = entries.length > 0 ? (made.length / entries.length * 100) : 0;
  const bestFinish = entries.reduce((best, e) => {
    const num = parseInt(e.f.replace("T","")) || 999;
    const bestNum = parseInt(best.replace("T","")) || 999;
    return num < bestNum ? e.f : best;
  }, "999");
  const avgSgApp = made.length > 0 ? made.reduce((a, e) => a + e.sa, 0) / made.length : 0;
  const avgSgPutt = made.length > 0 ? made.reduce((a, e) => a + e.sp, 0) / made.length : 0;
  const avgSgOtt = made.length > 0 ? made.reduce((a, e) => a + e.so, 0) / made.length : 0;
  const avgSgArg = made.length > 0 ? made.reduce((a, e) => a + e.sg, 0) / made.length : 0;

  const getFinishColor = (f) => {
    const n = parseInt(f.replace("T",""));
    if (f === "1") return C.gold;
    if (n <= 5) return C.green;
    if (n <= 10) return C.blue;
    if (n <= 20) return C.cyan;
    if (f === "CUT" || f === "WD") return C.red;
    return C.textDim;
  };

  const getSgColor = (v) => v > 0.5 ? C.green : v > 0 ? C.cyan : v > -0.5 ? C.textDim : C.red;

  return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: 20, marginTop: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: C.textDim, textTransform: "uppercase", letterSpacing: 1 }}>📍 Muirfield Village Golf Club Course History</div>
        <div style={{ fontSize: 11, color: C.textMuted }}>{entries.length} appearance{entries.length !== 1 ? "s" : ""} · 2019–2025</div>
      </div>

      {/* Summary Stats */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(95px, 1fr))", gap: 8, marginBottom: 16 }}>
        {[
          { label: "Best Finish", value: bestFinish === "999" ? "—" : bestFinish, color: getFinishColor(bestFinish) },
          { label: "Cut Rate", value: `${cutRate.toFixed(0)}%`, color: cutRate >= 70 ? C.green : cutRate >= 50 ? C.gold : C.red },
          { label: "Avg To Par", value: `${avgToPar >= 0 ? "+" : ""}${avgToPar.toFixed(1)}`, color: avgToPar < -10 ? C.gold : avgToPar < -5 ? C.green : avgToPar < 0 ? C.cyan : C.red },
          { label: "Avg SG Total", value: `${avgSgTotal >= 0 ? "+" : ""}${avgSgTotal.toFixed(2)}`, color: getSgColor(avgSgTotal) },
          { label: "SG: App", value: `${avgSgApp >= 0 ? "+" : ""}${avgSgApp.toFixed(2)}`, color: getSgColor(avgSgApp) },
          { label: "SG: Putt", value: `${avgSgPutt >= 0 ? "+" : ""}${avgSgPutt.toFixed(2)}`, color: getSgColor(avgSgPutt) },
          { label: "SG: OTT", value: `${avgSgOtt >= 0 ? "+" : ""}${avgSgOtt.toFixed(2)}`, color: getSgColor(avgSgOtt) },
          { label: "SG: ARG", value: `${avgSgArg >= 0 ? "+" : ""}${avgSgArg.toFixed(2)}`, color: getSgColor(avgSgArg) },
        ].map(s => (
          <div key={s.label} style={{ background: "rgba(0,0,0,0.3)", borderRadius: 6, padding: "6px 8px", textAlign: "center" }}>
            <div style={{ fontSize: 8, color: C.textMuted, textTransform: "uppercase", letterSpacing: 0.6 }}>{s.label}</div>
            <div style={{ fontSize: 15, fontWeight: 800, color: s.color, fontFamily: "'JetBrains Mono', monospace", marginTop: 2 }}>{s.value}</div>
          </div>
        ))}
      </div>

      {/* Year by Year Table */}
      <div style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
          <thead>
            <tr style={{ borderBottom: `2px solid ${C.border}` }}>
              {["Year", "Finish", "Rounds", "To Par", "SG:App", "SG:OTT", "SG:ARG", "SG:Putt", "SG Total"].map(h => (
                <th key={h} style={{ padding: "6px 6px", textAlign: h === "Year" || h === "Finish" || h === "Rounds" ? "left" : "right", color: C.textMuted, fontSize: 9, textTransform: "uppercase", letterSpacing: 0.5 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {entries.map(e => (
              <tr key={e.y} style={{ borderBottom: `1px solid ${C.border}` }}>
                <td style={{ padding: "6px 6px", color: C.text, fontWeight: 600, fontFamily: "'JetBrains Mono', monospace", fontSize: 11 }}>{e.y}</td>
                <td style={{ padding: "6px 6px" }}>
                  <span style={{ display: "inline-block", padding: "1px 8px", borderRadius: 4, fontSize: 11, fontWeight: 700, color: e.f === "CUT" || e.f === "WD" ? C.red : "#000", background: getFinishColor(e.f), fontFamily: "'JetBrains Mono', monospace" }}>{e.f}</span>
                </td>
                <td style={{ padding: "6px 6px", color: C.textDim, fontFamily: "'JetBrains Mono', monospace", fontSize: 10 }}>{e.r.join("-")}</td>
                <td style={{ padding: "6px 6px", textAlign: "right", fontWeight: 700, color: e.tp <= -15 ? C.gold : e.tp <= -8 ? C.green : e.tp < 0 ? C.cyan : C.red, fontFamily: "'JetBrains Mono', monospace" }}>{e.tp >= 0 ? "+" : ""}{e.tp}</td>
                <td style={{ padding: "6px 6px", textAlign: "right", color: getSgColor(e.sa), fontFamily: "'JetBrains Mono', monospace" }}>{e.sa >= 0 ? "+" : ""}{e.sa.toFixed(2)}</td>
                <td style={{ padding: "6px 6px", textAlign: "right", color: getSgColor(e.so), fontFamily: "'JetBrains Mono', monospace" }}>{e.so >= 0 ? "+" : ""}{e.so.toFixed(2)}</td>
                <td style={{ padding: "6px 6px", textAlign: "right", color: getSgColor(e.sg), fontFamily: "'JetBrains Mono', monospace" }}>{e.sg >= 0 ? "+" : ""}{e.sg.toFixed(2)}</td>
                <td style={{ padding: "6px 6px", textAlign: "right", color: getSgColor(e.sp), fontFamily: "'JetBrains Mono', monospace" }}>{e.sp >= 0 ? "+" : ""}{e.sp.toFixed(2)}</td>
                <td style={{ padding: "6px 6px", textAlign: "right", fontWeight: 700, color: getSgColor(e.st), fontFamily: "'JetBrains Mono', monospace" }}>{e.st >= 0 ? "+" : ""}{e.st.toFixed(2)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Mini SG Trend Visualization */}
      {made.length >= 2 && (
        <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${C.border}` }}>
          <div style={{ fontSize: 10, color: C.textMuted, marginBottom: 8 }}>Strokes Gained Trend (Made Cuts Only)</div>
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
            {[
              { label: "Approach", key: "sa", color: C.green },
              { label: "Off-Tee", key: "so", color: C.blue },
              { label: "Putting", key: "sp", color: C.gold },
              { label: "Around Green", key: "sg", color: C.purple },
            ].map(cat => {
              const vals = made.map(e => e[cat.key]);
              const max = Math.max(Math.abs(Math.min(...vals)), Math.abs(Math.max(...vals)), 2);
              return (
                <div key={cat.key} style={{ flex: "1 1 120px", minWidth: 120 }}>
                  <div style={{ fontSize: 9, color: cat.color, marginBottom: 4, fontWeight: 600 }}>{cat.label}</div>
                  <div style={{ display: "flex", alignItems: "center", gap: 2, height: 24 }}>
                    {vals.reverse().map((v, i) => {
                      const pct = (Math.abs(v) / max) * 100;
                      return (
                        <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center", height: 24, position: "relative" }}>
                          <div style={{ position: "absolute", top: v < 0 ? "50%" : undefined, bottom: v >= 0 ? "50%" : undefined, width: "100%", height: `${Math.min(pct, 100) / 2}%`, background: v >= 0 ? cat.color : C.red, opacity: 0.7, borderRadius: 2 }} />
                        </div>
                      );
                    })}
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 8, color: C.textMuted, marginTop: 2 }}>
                    <span>{made[made.length - 1]?.y}</span>
                    <span>{made[0]?.y}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
};

const RecentForm = ({ playerName }) => {
  const entries = FORM[playerName];
  if (!entries || entries.length === 0) {
    return (
      <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: 16, marginBottom: 16 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: C.textDim, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>🔥 Recent Form</div>
        <div style={{ fontSize: 11, color: C.textMuted, fontStyle: "italic" }}>No recent tournament data available</div>
      </div>
    );
  }

  // entries: [[evShort, finish, toPar, madeCut, sgApp, sgOtt, sgArg, sgPutt, sgTotal], ...]
  const made = entries.filter(e => e[3] === 1);
  const cuts = entries.length;
  const cutsMade = made.length;
  const avgTp = made.length ? made.reduce((s, e) => s + e[2], 0) / made.length : 0;
  const avgSg = made.length ? made.reduce((s, e) => s + e[8], 0) / made.length : 0;
  const avgApp = made.length ? made.reduce((s, e) => s + e[4], 0) / made.length : 0;
  const avgOtt = made.length ? made.reduce((s, e) => s + e[5], 0) / made.length : 0;
  const avgArg = made.length ? made.reduce((s, e) => s + e[6], 0) / made.length : 0;
  const avgPutt = made.length ? made.reduce((s, e) => s + e[7], 0) / made.length : 0;
  const bestFinish = entries.reduce((best, e) => {
    const n = parseInt(e[1]) || (e[1] === "1" ? 1 : 999);
    const bn = parseInt(best) || 999;
    return n < bn ? e[1] : best;
  }, entries[0][1]);

  const sgCol = (v) => v > 0.5 ? C.green : v > 0 ? C.cyan : v > -0.5 ? C.textDim : C.red;
  const finCol = (f) => { const n = parseInt(f) || 999; return f === "1" ? C.gold : n <= 5 ? C.green : n <= 10 ? C.blue : n <= 20 ? C.cyan : f === "CUT" || f === "WD" ? C.red : C.textMuted; };

  // Trend: compare last 3 vs prior 3
  const recent3 = made.slice(0, Math.min(3, made.length));
  const prior3 = made.slice(Math.min(3, made.length), Math.min(6, made.length));
  const r3sg = recent3.length ? recent3.reduce((s, e) => s + e[8], 0) / recent3.length : null;
  const p3sg = prior3.length ? prior3.reduce((s, e) => s + e[8], 0) / prior3.length : null;
  const trend = r3sg !== null && p3sg !== null ? r3sg - p3sg : null;

  return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: 16, marginBottom: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: C.textDim, textTransform: "uppercase", letterSpacing: 1 }}>🔥 Recent Form — Last {entries.length} Starts</div>
        {trend !== null && (
          <div style={{ fontSize: 11, fontWeight: 700, color: trend > 0.3 ? C.green : trend > 0 ? C.cyan : trend > -0.3 ? C.textDim : C.red }}>
            {trend > 0 ? "▲" : trend < 0 ? "▼" : "—"} {trend >= 0 ? "+" : ""}{trend.toFixed(2)} SG trend
          </div>
        )}
      </div>

      {/* Summary strip */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 8, marginBottom: 14 }}>
        {[
          { label: "Cuts", value: `${cutsMade}/${cuts}`, color: cutsMade === cuts ? C.green : cutsMade >= cuts * 0.7 ? C.cyan : C.red },
          { label: "Best", value: bestFinish, color: finCol(bestFinish) },
          { label: "Avg TP", value: avgTp >= 0 ? `+${avgTp.toFixed(1)}` : avgTp.toFixed(1), color: avgTp < -10 ? C.gold : avgTp < -5 ? C.green : avgTp < 0 ? C.cyan : C.red },
          { label: "SG Total", value: `${avgSg >= 0 ? "+" : ""}${avgSg.toFixed(2)}`, color: sgCol(avgSg) },
          { label: "SG App", value: `${avgApp >= 0 ? "+" : ""}${avgApp.toFixed(2)}`, color: sgCol(avgApp) },
          { label: "SG Putt", value: `${avgPutt >= 0 ? "+" : ""}${avgPutt.toFixed(2)}`, color: sgCol(avgPutt) },
        ].map((s) => (
          <div key={s.label} style={{ background: "rgba(0,0,0,0.3)", borderRadius: 6, padding: "6px 8px", textAlign: "center" }}>
            <div style={{ fontSize: 8, color: C.textMuted, textTransform: "uppercase", letterSpacing: 0.5 }}>{s.label}</div>
            <div style={{ fontSize: 14, fontWeight: 800, color: s.color, fontFamily: "'JetBrains Mono', monospace", marginTop: 2 }}>{s.value}</div>
          </div>
        ))}
      </div>

      {/* Event-by-event table */}
      <div style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
          <thead>
            <tr style={{ borderBottom: `2px solid ${C.border}` }}>
              {["Event", "Finish", "To Par", "SG:App", "SG:OTT", "SG:ARG", "SG:Putt", "SG Total"].map((h, i) => (
                <th key={h} style={{ padding: "6px 8px", textAlign: i === 0 ? "left" : "right", fontSize: 9, color: C.textMuted, textTransform: "uppercase", letterSpacing: 0.5 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {entries.map((e, i) => {
              const [ev, fin, tp, mc, sa, so, sg, sp, st] = e;
              const evFull = EV_NAMES[ev] || ev;
              return (
                <tr key={i} style={{ borderBottom: `1px solid ${C.border}`, opacity: mc ? 1 : 0.5 }}>
                  <td style={{ padding: "6px 8px", color: C.text, fontWeight: 600 }} title={evFull}>{evFull.length > 22 ? evFull.slice(0, 20) + "…" : evFull}</td>
                  <td style={{ padding: "6px 8px", textAlign: "right" }}>
                    <span style={{ background: finCol(fin), color: "#000", padding: "2px 8px", borderRadius: 4, fontWeight: 800, fontSize: 10, fontFamily: "'JetBrains Mono', monospace" }}>{fin}</span>
                  </td>
                  <td style={{ padding: "6px 8px", textAlign: "right", color: tp < -10 ? C.gold : tp < -5 ? C.green : tp < 0 ? C.cyan : C.red, fontFamily: "'JetBrains Mono', monospace", fontWeight: 600 }}>{tp >= 0 ? `+${tp}` : tp}</td>
                  <td style={{ padding: "6px 8px", textAlign: "right", color: sgCol(sa), fontFamily: "'JetBrains Mono', monospace" }}>{sa >= 0 ? "+" : ""}{sa.toFixed(1)}</td>
                  <td style={{ padding: "6px 8px", textAlign: "right", color: sgCol(so), fontFamily: "'JetBrains Mono', monospace" }}>{so >= 0 ? "+" : ""}{so.toFixed(1)}</td>
                  <td style={{ padding: "6px 8px", textAlign: "right", color: sgCol(sg), fontFamily: "'JetBrains Mono', monospace" }}>{sg >= 0 ? "+" : ""}{sg.toFixed(1)}</td>
                  <td style={{ padding: "6px 8px", textAlign: "right", color: sgCol(sp), fontFamily: "'JetBrains Mono', monospace" }}>{sp >= 0 ? "+" : ""}{sp.toFixed(1)}</td>
                  <td style={{ padding: "6px 8px", textAlign: "right", color: sgCol(st), fontWeight: 800, fontFamily: "'JetBrains Mono', monospace" }}>{st >= 0 ? "+" : ""}{st.toFixed(1)}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* SG Mini trend bars - visual form at a glance */}
      {made.length >= 2 && (
        <div style={{ marginTop: 14 }}>
          <div style={{ fontSize: 9, color: C.textMuted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 6 }}>SG Form Trend (made cuts, oldest → newest)</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10 }}>
            {[
              { label: "Approach", idx: 4 },
              { label: "Off-Tee", idx: 5 },
              { label: "Putting", idx: 7 },
              { label: "Around Green", idx: 6 },
            ].map(({ label, idx }) => {
              const vals = [...made].reverse().map(e => e[idx]);
              const maxAbs = Math.max(...vals.map(Math.abs), 0.5);
              return (
                <div key={label}>
                  <div style={{ fontSize: 8, color: C.textMuted, marginBottom: 3, textAlign: "center" }}>{label}</div>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 2, height: 32 }}>
                    {vals.map((v, vi) => {
                      const h = Math.abs(v) / maxAbs * 14;
                      return (
                        <div key={vi} style={{ display: "flex", flexDirection: "column", alignItems: "center", width: 12 }}>
                          <div style={{ height: 14, display: "flex", alignItems: "flex-end" }}>
                            {v > 0 && <div style={{ width: 8, height: h, background: C.green, borderRadius: 1 }} />}
                          </div>
                          <div style={{ height: 1, width: 8, background: C.border }} />
                          <div style={{ height: 14, display: "flex", alignItems: "flex-start" }}>
                            {v < 0 && <div style={{ width: 8, height: h, background: C.red, borderRadius: 1 }} />}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
};

const CustomTooltip = ({ active, payload }) => {
  if (!active || !payload?.length) return null;
  const d = payload[0]?.payload;
  if (!d) return null;
  return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 6, padding: "8px 12px", fontSize: 11, color: C.text }}>
      <div style={{ fontWeight: 700 }}>{d.n || d.name}</div>
      {payload.map((p, i) => (
        <div key={i} style={{ color: p.color, marginTop: 2 }}>{p.name}: {typeof p.value === "number" ? p.value.toFixed(2) : p.value}</div>
      ))}
    </div>
  );
};

                  ))}
                </div>
                <div style={{ background: "rgba(251,191,36,0.06)", border: `1px solid rgba(251,191,36,0.2)`, borderRadius: 8, padding: "12px 16px", fontSize: 11, color: C.textDim, lineHeight: 1.6 }}>
                  <span style={{ color: C.gold, fontWeight: 700 }}>Why dual-mode matters:</span> Most prediction models optimize for one thing. BBI recognizes that a great pool pick and a great DFS pick are fundamentally different animals. Pool rewards consistency, cut-making, and low variance. DFS GPPs reward ceiling, ownership leverage, and salary efficiency. Same data, different strategy — toggled with one click.
                </div>
              </div>

              {/* COURSE FIT */}
              <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "24px 28px", marginBottom: 16 }}>
                <div style={{ fontSize: 15, fontWeight: 800, color: C.gold, marginBottom: 14 }}>§3 — Course Fit Algorithm</div>
                <div style={{ fontSize: 12, color: C.textDim, marginBottom: 12 }}>
                  "Course fit" is the most abused phrase in golf media. Pundits throw it around based on vibes — <em>"he's a bomber so he'll like this track."</em> BirdieBuddy doesn't guess. We compute.
                </div>
                <div style={{ fontSize: 12, color: C.textDim, marginBottom: 12 }}>
                  Our course fit algorithm processes <span style={{ color: C.text, fontWeight: 600 }}>every made-cut appearance</span> at the specific course over the last 7 years. For each appearance, we extract the per-round strokes-gained decomposition across five categories: SG: Approach, SG: Off-the-Tee, SG: Around-the-Green, SG: Putting, and SG: Total. We then compute a weighted average that reflects true course-specific performance — not how a player is playing in general, but how they play <em>here</em>.
                </div>
                <div style={{ fontSize: 12, color: C.textDim, marginBottom: 12 }}>
                  The normalization formula maps average SG Total into a 0.0–1.0 scale: <span style={{ fontFamily: "'JetBrains Mono', monospace", color: C.cyan, fontSize: 11 }}>(avg_sg_total + 3) / 6</span>. A player averaging +3.0 SG Total at a course (elite) scores 1.0. A player averaging -3.0 (terrible) scores 0.0. The neutral baseline for players with no course history is set at 0.475 — slightly below center, because missing data is a risk factor, not a neutral one.
                </div>
                <div style={{ fontSize: 12, color: C.textDim, marginBottom: 8 }}>
                  What this catches that "vibes" don't: <span style={{ color: C.text, fontWeight: 600 }}>Rickie Fowler</span> won the 2019 Phoenix Open, but his SG trend since then shows declining approach numbers and a 2024 missed cut. The model knows his course fit is fading even though the narrative says "past champion." Similarly, <span style={{ color: C.text, fontWeight: 600 }}>Maverick McNealy</span> has only 3 Phoenix appearances but his last two (T6, T9) produced a +2.36 SG Total in 2025 — the model correctly identifies a rising course specialist that the market underprices.
                </div>
              </div>

              {/* VALUE COMPOSITE */}
              <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "24px 28px", marginBottom: 16 }}>
                <div style={{ fontSize: 15, fontWeight: 800, color: C.gold, marginBottom: 14 }}>§4 — DFS Value Composite</div>
                <div style={{ fontSize: 12, color: C.textDim, marginBottom: 12 }}>
                  Traditional DFS "value" is a single ratio: points divided by salary. That's a toy metric. BirdieBuddy's Value Score is a <span style={{ color: C.text, fontWeight: 600 }}>three-component composite</span> designed to identify where DraftKings has mispriced talent:
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr", gap: 10, marginBottom: 14 }}>
                  {[
                    { name: "Rank Gap (40%)", desc: "Compares each player's DataGolf skill rank to their DraftKings salary rank. If DataGolf has a player 15th in the field but DraftKings prices him 45th-cheapest, that's a +30 rank gap — massive mispricing. This directly measures where the pricing algorithm got it wrong.", color: C.gold },
                    { name: "Points per $1K (30%)", desc: "Expected fantasy output per thousand dollars of salary. We weight finish probabilities — win × 10, top-5 × 5, top-10 × 3, top-20 × 1.5, make-cut × 0.5 — then divide by salary in thousands. This is the efficiency metric sharps use for cash game construction, adapted for GPP identification.", color: C.green },
                    { name: "Ownership Efficiency (30%)", desc: "Upside per ownership point. A player with 3% win probability at 2% ownership delivers 1.5x more GPP value than a 25% win probability at 30% ownership. This component specifically targets the leverage plays that win tournaments — high upside at low roster penetration.", color: C.cyan },
                  ].map((c) => (
                    <div key={c.name} style={{ background: "rgba(0,0,0,0.3)", borderRadius: 8, padding: "12px 16px", borderLeft: `3px solid ${c.color}` }}>
                      <div style={{ fontSize: 12, fontWeight: 700, color: c.color, marginBottom: 4 }}>{c.name}</div>
                      <div style={{ fontSize: 11, color: C.textDim, lineHeight: 1.6 }}>{c.desc}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* FORM DETECTION */}
              <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "24px 28px", marginBottom: 16 }}>
                <div style={{ fontSize: 15, fontWeight: 800, color: C.gold, marginBottom: 14 }}>§5 — Form Detection System</div>
                <div style={{ fontSize: 12, color: C.textDim, marginBottom: 12 }}>
                  Recent form analysis uses a <span style={{ color: C.text, fontWeight: 600 }}>rolling 6-tournament lookback window</span> drawing from the last 9 completed PGA Tour events. For each start, we capture the full strokes-gained decomposition — not just finish position, which can be noisy, but the underlying performance metrics that predict future results.
                </div>
                <div style={{ fontSize: 12, color: C.textDim, marginBottom: 12 }}>
                  The <span style={{ color: C.text, fontWeight: 600 }}>SG Trend Indicator</span> compares the 3 most recent made cuts to the prior 3, computing a directional delta. A player trending ▲ +0.50 in SG Total means they're gaining half a stroke per round more than their recent baseline — that's significant form improvement the market often hasn't priced in yet.
                </div>
                <div style={{ fontSize: 12, color: C.textDim, marginBottom: 8 }}>
                  Critically, we separate SG categories in the trend visualization. A player might be trending up in SG: Putting but down in SG: Approach — the net SG Total could look flat while the underlying composition is shifting. At a putting-heavy course, that matters. Our category-level trend bars make this visible at a glance.
                </div>
              </div>

              {/* OWNERSHIP INTELLIGENCE */}
              <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "24px 28px", marginBottom: 16 }}>
                <div style={{ fontSize: 15, fontWeight: 800, color: C.gold, marginBottom: 14 }}>§6 — Ownership Intelligence & Game Theory</div>
                <div style={{ fontSize: 12, color: C.textDim, marginBottom: 12 }}>
                  In a 100-person pool, your biggest enemy isn't variance — it's correlation. If you and 60 other teams roster the same player, a great performance helps you but doesn't differentiate you. BirdieBuddy's ownership intelligence layer implements <span style={{ color: C.text, fontWeight: 600 }}>systematic behavioral exploitation</span>:
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
                  {[
                    { title: "Leverage Ratio", desc: "Win probability divided by ownership percentage. A leverage ratio above 1.0x means the player offers more upside than the field is pricing in. Below 0.5x means you're paying an ownership premium for diminishing edge." },
                    { title: "Contrarian Factor", desc: "Inverse ownership score rewards low-owned players. In a pool where the top 5 picks absorb 200%+ combined ownership, differentiation via the tail of the distribution creates structural alpha." },
                    { title: "Chalk Fading", desc: "Our research identified that mega-chalk at majors consistently underperforms ownership: Bryson DeChambeau drew 101% ownership at the 2025 US Open. Hometown heroes regularly exceed 50% ownership. The model systematically fades these scenarios." },
                    { title: "Ownership Estimation", desc: "When direct ownership data isn't available, we model projected ownership from DataGolf rank and DraftKings salary using a multi-factor regression. Top DG rank + high salary = high ownership. The estimation captures ~85% of actual ownership variance." },
                  ].map((d) => (
                    <div key={d.title} style={{ background: "rgba(0,0,0,0.3)", borderRadius: 8, padding: "12px 14px" }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: C.text, marginBottom: 4 }}>{d.title}</div>
                      <div style={{ fontSize: 10, color: C.textMuted, lineHeight: 1.6 }}>{d.desc}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* WHAT SEPARATES US */}
              <div style={{ background: `linear-gradient(135deg, rgba(251,191,36,0.08) 0%, ${C.card} 100%)`, border: `1px solid rgba(251,191,36,0.3)`, borderRadius: 10, padding: "24px 28px", marginBottom: 16 }}>
                <div style={{ fontSize: 15, fontWeight: 800, color: C.gold, marginBottom: 14 }}>§7 — What Separates BirdieBuddy</div>
                <div style={{ fontSize: 12, color: C.textDim, marginBottom: 12 }}>
                  DataGolf is an exceptional data provider — arguably the best in golf analytics. We use their data because it's the gold standard. But <span style={{ color: C.gold, fontWeight: 600 }}>DataGolf is a data platform. BirdieBuddy is a decision engine.</span>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
                  {[
                    { label: "DataGolf", items: ["Provides raw probabilities and skill ratings", "Offers general fantasy projections", "Shows historical results in tabular format", "One-size-fits-all ranking system", "No ownership or behavioral analysis", "No pool-specific optimization"] },
                    { label: "BirdieBuddy", items: ["Synthesizes probabilities into a 10-factor composite score", "Dual-mode optimization for Pool vs DFS strategy", "7-year course history with SG trend visualization", "3-component value scoring identifying salary mispricing", "Behavioral game theory with ownership exploitation", "Pool-specific penalty modeling and usage management"] },
                  ].map((col) => (
                    <div key={col.label} style={{ background: "rgba(0,0,0,0.3)", borderRadius: 8, padding: "14px 16px" }}>
                      <div style={{ fontSize: 12, fontWeight: 800, color: col.label === "BirdieBuddy" ? C.gold : C.textDim, marginBottom: 8 }}>{col.label}</div>
                      {col.items.map((item, i) => (
                        <div key={i} style={{ fontSize: 10, color: col.label === "BirdieBuddy" ? C.text : C.textMuted, padding: "3px 0", lineHeight: 1.5 }}>
                          {col.label === "BirdieBuddy" ? "✦ " : "· "}{item}
                        </div>
                      ))}
                    </div>
                  ))}
                </div>
                <div style={{ fontSize: 12, color: C.textDim, lineHeight: 1.7 }}>
                  Put simply: DataGolf tells you <em>who might win</em>. BirdieBuddy tells you <span style={{ color: C.gold, fontWeight: 600 }}>who to pick, why, and what everyone else is getting wrong</span>. We transform raw statistical output into actionable strategy — accounting for your format's specific rules, your opponents' behavioral tendencies, and the market's systematic biases.
                </div>
              </div>

              {/* TECHNICAL SPECS */}
              <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "24px 28px", marginBottom: 16 }}>
                <div style={{ fontSize: 15, fontWeight: 800, color: C.gold, marginBottom: 14 }}>§8 — Technical Specifications</div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10 }}>
                  {[
                    { label: "Data Sources", value: "4 API endpoints", sub: "Real-time DataGolf feeds" },
                    { label: "Historical Depth", value: "7 years", sub: "2019–2025 round-level data" },
                    { label: "Field Coverage", value: "122 players", sub: "Full tournament field" },
                    { label: "Course History", value: "86 players", sub: "With prior appearances" },
                    { label: "Recent Form", value: "9 events", sub: "Rolling lookback window" },
                    { label: "Form Coverage", value: "120 players", sub: "With recent tour starts" },
                    { label: "SG Categories", value: "5 metrics", sub: "App, OTT, ARG, Putt, Total" },
                    { label: "Scoring Factors", value: "10 factors", sub: "Dual-weighted composite" },
                    { label: "Value Components", value: "3 signals", sub: "Rank gap + efficiency + ownership" },
                    { label: "Probability Models", value: "3 surfaces", sub: "DG Historical, Baseline, Market" },
                    { label: "Optimization Modes", value: "2 modes", sub: "Pool + DFS simultaneously" },
                    { label: "Data Points", value: "~50,000+", sub: "Per tournament analysis" },
                  ].map((s) => (
                    <div key={s.label} style={{ background: "rgba(0,0,0,0.3)", borderRadius: 6, padding: "10px 12px", textAlign: "center" }}>
                      <div style={{ fontSize: 8, color: C.textMuted, textTransform: "uppercase", letterSpacing: 0.8 }}>{s.label}</div>
                      <div style={{ fontSize: 18, fontWeight: 800, color: C.gold, fontFamily: "'JetBrains Mono', monospace", marginTop: 2 }}>{s.value}</div>
                      <div style={{ fontSize: 9, color: C.textDim, marginTop: 2 }}>{s.sub}</div>
                    </div>
                  ))}
                </div>
              </div>

              <div style={{ textAlign: "center", padding: "20px 0 10px", fontSize: 10, color: C.textMuted }}>
                BirdieBuddy v4.0 · Built with DataGolf API · Model architecture by BirdieBuddy Labs
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}
