<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in — BirdieBuddy</title>
<!-- bb-favicon-og -->
<link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/img/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/img/apple-touch-icon.png">
<meta property="og:type" content="website">
<meta property="og:site_name" content="BirdieBuddy">
<meta property="og:title" content="BirdieBuddy — Golf's best-kept secret.">
<meta property="og:description" content="A fifteen-agent prediction engine for PGA Tour tournaments. Ten factors. Ten thousand simulations. One edge, every week.">
<meta property="og:image" content="https://birdiebuddy.io/assets/img/og-image.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://birdiebuddy.io/assets/img/og-image.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/design-system.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <style>
    .auth-wrap{max-width:420px;margin:var(--space-12) auto;background:var(--surface-3);
      border:1px solid var(--border-strong);border-radius:var(--radius-2xl);
      overflow:hidden;box-shadow:var(--shadow-xl)}
    .auth-wrap .hd{padding:var(--space-6) var(--space-6) var(--space-4)}
    .auth-wrap .hd h1{font-size:var(--fs-xl);color:var(--text-primary);font-weight:700}
    .auth-tabs{display:flex;gap:4px;padding:0 var(--space-6)}
    .auth-tabs button{flex:1;padding:10px;font-size:var(--fs-xs);font-weight:600;
      color:var(--text-muted);border-bottom:2px solid transparent}
    .auth-tabs button.on{color:var(--gold-500);border-color:var(--gold-500)}
    .auth-form{padding:var(--space-5) var(--space-6) var(--space-6);display:grid;gap:var(--space-3)}
    .auth-form label{display:block;font-size:var(--fs-3xs);font-weight:600;text-transform:uppercase;
      letter-spacing:var(--tracking-wide);color:var(--text-muted);margin-bottom:5px}
    .auth-form input{width:100%;padding:11px 12px;background:var(--surface-1);
      border:1px solid var(--border-base);border-radius:var(--radius-md);
      color:var(--text-primary);font-size:var(--fs-sm)}
    .auth-form input:focus{outline:none;border-color:var(--gold-500)}
    .auth-err{color:var(--negative);font-size:var(--fs-xs);min-height:1em}
    .auth-note{font-size:var(--fs-3xs);color:var(--text-dimmed);
      padding:0 var(--space-6) var(--space-6);line-height:1.5}
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="container">
    <div id="loginMount"></div>
  </main>

  <div id="site-footer"></div>

  <script src="assets/js/core.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/animations.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await BBI.renderHeader('login.html');
      await BBI.renderFooter();
      const mount = document.getElementById('loginMount');

      if (BBI.auth.isLoggedIn()) {
        const u = BBI.auth.user();
        mount.innerHTML = `
          <div class="auth-wrap" style="text-align:center;padding:var(--space-8) var(--space-6)">
            <div class="eyebrow" style="margin-bottom:var(--space-3)">Signed in</div>
            <h1 class="h-3" style="margin-bottom:var(--space-2)">Hi, ${(u.name||u.email)}</h1>
            <p class="muted" style="font-size:var(--fs-sm);margin-bottom:var(--space-6)">
              You're on the ${BBI.auth.TIERS[u.tier].name} plan.</p>
            <a class="btn btn-primary btn-lg" href="account.html">Go to my account</a>
          </div>`;
        return;
      }

      let mode = 'login';
      const draw = () => {
        mount.innerHTML = `
          <div class="auth-wrap">
            <div class="hd">
              <div class="eyebrow">BirdieBuddy</div>
              <h1>${mode==='login'?'Welcome back':'Create your account'}</h1>
            </div>
            <div class="auth-tabs">
              <button data-m="login" class="${mode==='login'?'on':''}">Sign in</button>
              <button data-m="signup" class="${mode==='signup'?'on':''}">Create account</button>
            </div>
            <form class="auth-form" id="f" novalidate>
              ${mode==='signup'?`<div><label>Name</label><input name="name" autocomplete="name"/></div>`:''}
              <div><label>Email</label><input name="email" type="email" autocomplete="email" required/></div>
              <div><label>Password</label><input name="password" type="password" required/></div>
              ${mode==='signup'?`<div><label>Discount code <span class="muted" style="font-weight:400">(optional)</span></label><input name="promo" autocomplete="off" style="text-transform:uppercase"/><div id="ph" style="font-size:var(--fs-xs);margin-top:4px;min-height:1em"></div></div>`:''}
              <div class="auth-err" id="e" role="alert"></div>
              <button class="btn btn-primary btn-block btn-lg" type="submit" id="s">
                ${mode==='login'?'Sign in':'Create account'}</button>
            </form>
            <div class="auth-note">Demo mode — accounts are stored only in this browser and
              upgrades are simulated until the billing backend is connected. Don't reuse a real password.</div>
          </div>`;
        mount.querySelectorAll('[data-m]').forEach(b =>
          b.onclick = () => { mode = b.dataset.m; draw(); });
        const f = document.getElementById('f');
        const promoEl = f.querySelector('[name="promo"]'), ph = document.getElementById('ph');
        if (promoEl) promoEl.addEventListener('input', () => {
          const raw = promoEl.value.trim();
          if (!raw) { ph.textContent = ''; return; }
          const p = BBI.auth.validatePromo(raw);
          ph.textContent = p ? `✓ ${p.label} — ${p.kind}` : 'Code not recognized';
          ph.style.color = p ? 'var(--positive)' : 'var(--text-muted)';
        });
        f.onsubmit = async ev => {
          ev.preventDefault();
          const btn = document.getElementById('s'), err = document.getElementById('e');
          const fd = new FormData(f);
          btn.disabled = true; err.textContent = '';
          try {
            const data = { email: fd.get('email'), password: fd.get('password'), name: fd.get('name'), promo: fd.get('promo') };
            if (mode === 'signup') await BBI.auth.signup(data);
            else await BBI.auth.login(data);
            location.href = 'account.html';
          } catch (ex) {
            err.textContent = ex.message || 'Something went wrong.';
            btn.disabled = false;
          }
        };
      };
      draw();
    });
  </script>
</body>
</html>
