<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Player Profile — BirdieBuddy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/design-system.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <style>
    /* ===== PLAYER PROFILE PAGE ===== */

    /* ===== WAYFINDING: toolbar, combobox, anchor nav, mini-strip ===== */
    .player-toolbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: var(--space-3);
      align-items: center;
      padding: var(--space-3) var(--space-4);
      background: var(--surface-2);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-5);
    }

    .player-nav-arrow {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: 8px 12px;
      background: var(--surface-3);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      color: var(--text-body);
      font-size: var(--fs-xs);
      font-weight: 500;
      cursor: pointer;
      transition: all var(--dur-fast) var(--ease-out);
      text-decoration: none;
      white-space: nowrap;
    }

    .player-nav-arrow:hover:not([disabled]) {
      background: var(--surface-5);
      border-color: var(--border-base);
      color: var(--text-primary);
    }

    .player-nav-arrow[disabled] {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .player-nav-arrow .arrow-sub {
      color: var(--text-dimmed);
      font-family: var(--font-mono);
      font-size: var(--fs-3xs);
    }

    .player-combobox {
      position: relative;
    }

    .player-combobox-input {
      width: 100%;
      padding: 9px 36px 9px 32px;
      background: var(--surface-3);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: var(--fs-sm);
      font-family: var(--font-body);
      outline: none;
      transition: border-color var(--dur-fast) var(--ease-out);
    }

    .player-combobox-input:focus {
      border-color: var(--border-gold);
      box-shadow: 0 0 0 3px rgba(212, 168, 67, 0.12);
    }

    .player-combobox-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    .player-combobox-kbd {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--font-mono);
      font-size: var(--fs-3xs);
      color: var(--text-dimmed);
      background: var(--surface-2);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xs);
      padding: 2px 6px;
      pointer-events: none;
    }

    .player-combobox-menu {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      max-height: 300px;
      overflow-y: auto;
      background: var(--surface-4);
      border: 1px solid var(--border-base);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      z-index: var(--z-elevated);
      display: none;
    }

    .player-combobox-menu.open { display: block; }

    .player-combobox-item {
      display: grid;
      grid-template-columns: 32px 1fr auto;
      gap: var(--space-3);
      align-items: center;
      padding: 8px 12px;
      cursor: pointer;
      color: var(--text-body);
      font-size: var(--fs-sm);
      border-bottom: 1px solid var(--border-subtle);
      transition: background var(--dur-fast) var(--ease-out);
    }

    .player-combobox-item:last-child { border-bottom: none; }
    .player-combobox-item:hover,
    .player-combobox-item.active {
      background: var(--surface-5);
      color: var(--text-primary);
    }

    .player-combobox-item .rank {
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
      color: var(--gold-300);
      font-size: var(--fs-xs);
      font-weight: 600;
    }

    .player-combobox-item .tier-mini {
      font-family: var(--font-mono);
      font-size: var(--fs-3xs);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .player-combobox-empty {
      padding: var(--space-4);
      text-align: center;
      color: var(--text-muted);
      font-size: var(--fs-sm);
    }

    /* Mobile anchor nav */
    .player-anchor-nav {
      display: flex;
      gap: var(--space-1);
      padding: var(--space-2) var(--space-1);
      margin-bottom: var(--space-5);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      border-bottom: 1px solid var(--border-subtle);
    }
    .player-anchor-nav::-webkit-scrollbar { display: none; }

    .player-anchor-nav a {
      flex: 0 0 auto;
      padding: 6px 12px;
      font-size: var(--fs-xs);
      font-weight: 500;
      color: var(--text-muted);
      border-radius: var(--radius-full);
      transition: all var(--dur-fast) var(--ease-out);
      white-space: nowrap;
    }

    .player-anchor-nav a:hover {
      color: var(--text-primary);
      background: var(--surface-3);
    }

    /* Sticky mini-strip: appears when main player header scrolls off.
       Uses max-height/padding collapse so hidden state doesn't occupy layout space. */
    .player-mini-strip {
      position: sticky;
      top: calc(var(--nav-h) + var(--status-h));
      z-index: var(--z-sticky);
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: var(--space-3);
      align-items: center;
      background: rgba(16, 16, 23, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: var(--radius-md);
      /* Hidden state: zero height, zero padding, transparent border, no margin */
      padding: 0 var(--space-4);
      max-height: 0;
      margin-bottom: 0;
      border: 1px solid transparent;
      opacity: 0;
      overflow: hidden;
      pointer-events: none;
      transition:
        max-height var(--dur-base) var(--ease-out),
        padding var(--dur-base) var(--ease-out),
        margin-bottom var(--dur-base) var(--ease-out),
        opacity var(--dur-base) var(--ease-out),
        border-color var(--dur-base) var(--ease-out);
    }

    .player-mini-strip.visible {
      max-height: 72px;
      padding: 10px var(--space-4);
      margin-bottom: var(--space-4);
      border-color: var(--border-base);
      opacity: 1;
      pointer-events: auto;
    }

    .mini-rank {
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
      font-size: var(--fs-lg);
      font-weight: 700;
      color: var(--gold-300);
    }

    .mini-name {
      font-size: var(--fs-md);
      font-weight: 600;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mini-tier {
      font-family: var(--font-mono);
      font-size: var(--fs-3xs);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .mini-strip-nav {
      display: inline-flex;
      gap: 4px;
    }

    .mini-strip-nav button {
      padding: 4px 8px;
      background: var(--surface-3);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-sm);
      color: var(--text-body);
      font-size: var(--fs-xs);
      cursor: pointer;
    }

    .mini-strip-nav button:hover:not([disabled]) {
      background: var(--surface-5);
    }
    .mini-strip-nav button[disabled] { opacity: 0.4; cursor: not-allowed; }

    @media (max-width: 640px) {
      .player-toolbar {
        grid-template-columns: auto 1fr auto;
        gap: var(--space-2);
        padding: var(--space-2) var(--space-3);
      }
      .player-nav-arrow {
        padding: 6px 8px;
        font-size: var(--fs-2xs);
      }
      .player-nav-arrow .arrow-label { display: none; }
      .player-combobox-kbd { display: none; }
    }

    .player-header {
      display: flex;
      gap: var(--space-6);
      align-items: flex-start;
      margin-bottom: var(--space-8);
      flex-wrap: wrap;
    }

    @media (max-width: 640px) {
      .player-header {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    .player-headshot {
      width: 100px;
      height: 100px;
      border-radius: var(--radius-full);
      background: linear-gradient(135deg, var(--gold-600) 0%, var(--gold-700) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--fs-2xl);
      font-weight: 700;
      color: var(--text-on-gold);
      flex-shrink: 0;
    }

    .player-info {
      flex: 1;
    }

    .player-name-section {
      display: flex;
      align-items: baseline;
      gap: var(--space-4);
      margin-bottom: var(--space-3);
      flex-wrap: wrap;
    }

    .player-full-name {
      font-size: var(--fs-4xl);
      font-weight: 700;
      color: var(--text-primary);
      line-height: var(--lh-tight);
      margin: 0;
    }

    .tier-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: var(--radius-full);
      font-size: var(--fs-xs);
      font-weight: 600;
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      background: var(--surface-3);
      border: 1px solid var(--border-soft);
    }

    .tier-badge.specialist { background: rgba(212, 168, 67, 0.1); border-color: var(--gold-700); color: var(--gold-300); }
    .tier-badge.comfortable { background: rgba(74, 222, 128, 0.1); border-color: var(--positive-deep); color: var(--positive); }
    .tier-badge.neutral { background: var(--surface-3); border-color: var(--border-base); color: var(--text-muted); }
    .tier-badge.struggle { background: rgba(248, 113, 113, 0.1); border-color: var(--negative-deep); color: var(--negative); }

    .player-meta-row {
      display: flex;
      gap: var(--space-6);
      font-size: var(--fs-md);
      color: var(--text-body);
      flex-wrap: wrap;
    }

    .meta-item {
      display: flex;
      gap: var(--space-2);
      align-items: center;
    }

    .meta-label {
      color: var(--text-muted);
      font-size: var(--fs-xs);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
    }

    .meta-value {
      color: var(--text-primary);
      font-weight: 600;
    }

    /* ===== EVENT SNAPSHOT ===== */
    .snapshot-card {
      background: linear-gradient(135deg, rgba(212, 168, 67, 0.06) 0%, transparent 45%), var(--surface-3);
      border: 1px solid var(--border-gold);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      margin-bottom: var(--space-8);
      position: relative;
      overflow: hidden;
    }

    .snapshot-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-500), transparent);
      opacity: 0.6;
    }

    .snapshot-head {
      margin-bottom: var(--space-5);
    }

    .snapshot-eyebrow {
      font-family: var(--font-mono);
      font-size: var(--fs-3xs);
      letter-spacing: var(--tracking-widest);
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: var(--space-2);
    }

    /* Hero row: #rank | TL;DR + composite */
    .snapshot-hero {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: var(--space-5);
      align-items: center;
      margin-bottom: var(--space-5);
    }

    .snapshot-rank {
      font-size: var(--fs-5xl);
      font-weight: 700;
      color: var(--gold-300);
      font-variant-numeric: tabular-nums;
      line-height: 1;
      padding-right: var(--space-5);
      border-right: 1px solid var(--border-soft);
    }

    .snapshot-rank-label {
      display: block;
      font-family: var(--font-mono);
      font-size: var(--fs-3xs);
      letter-spacing: var(--tracking-widest);
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 500;
      margin-top: var(--space-1);
    }

    .snapshot-tldr {
      font-size: var(--fs-lg);
      line-height: var(--lh-snug);
      color: var(--text-primary);
      font-weight: 500;
      margin-bottom: var(--space-2);
    }

    .snapshot-score {
      font-family: var(--font-mono);
      font-size: var(--fs-sm);
      color: var(--text-muted);
      letter-spacing: var(--tracking-wide);
    }

    .snapshot-score strong {
      color: var(--text-body);
      font-weight: 600;
    }

    @media (max-width: 640px) {
      .snapshot-hero {
        grid-template-columns: 1fr;
        gap: var(--space-3);
      }
      .snapshot-rank {
        border-right: none;
        border-bottom: 1px solid var(--border-soft);
        padding-right: 0;
        padding-bottom: var(--space-3);
      }
    }

    .prob-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: var(--space-4);
    }

    .prob-cell {
      background: var(--surface-2);
      border: 1px solid var(--border-base);
      border-radius: var(--radius-md);
      padding: var(--space-3);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .prob-label {
      font-family: var(--font-mono);
      font-size: var(--fs-3xs);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .prob-value {
      font-size: var(--fs-xl);
      font-weight: 700;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
    }

    .prob-fieldmax {
      font-family: var(--font-mono);
      font-size: var(--fs-3xs);
      color: var(--text-dimmed);
      margin-top: 3px;
    }

    .prob-bar {
      position: relative;
      height: 4px;
      background: var(--surface-4);
      border-radius: var(--radius-full);
      margin-top: var(--space-2);
      overflow: hidden;
    }

    .prob-bar-fill {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      background: linear-gradient(90deg, var(--gold-600) 0%, var(--gold-300) 100%);
      border-radius: var(--radius-full);
      animation: fadeIn var(--dur-slow) var(--ease-out);
    }

    .prob-cell.is-leader {
      border-color: var(--border-gold-strong);
      background: linear-gradient(135deg, rgba(212, 168, 67, 0.10) 0%, var(--surface-2) 60%);
    }

    .prob-cell.is-leader .prob-value {
      color: var(--gold-300);
    }

    .snapshot-narrative {
      margin-top: var(--space-5);
      padding-top: var(--space-5);
      border-top: 1px solid var(--border-soft);
      font-size: var(--fs-md);
      color: var(--text-body);
      line-height: var(--lh-relaxed);
    }

    /* ===== FACTOR DECOMPOSITION ===== */
    .factor-chart-wrapper {
      background: var(--surface-3);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      margin-bottom: var(--space-8);
    }

    .factor-chart-head {
      margin-bottom: var(--space-5);
    }

    .factor-chart-title {
      font-size: var(--fs-xl);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-2);
    }

    .factor-chart-caption {
      font-size: var(--fs-md);
      color: var(--text-body);
    }

    /* Factor Decomposition v2 — sorted, utilization-aware, grouped */
    .factor-group { margin-bottom: var(--space-5); }
    .factor-group:last-child { margin-bottom: 0; }

    .factor-group-label {
      font-family: var(--font-mono);
      font-size: var(--fs-3xs);
      font-weight: 600;
      letter-spacing: var(--tracking-widest);
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: var(--space-3);
      padding-bottom: var(--space-2);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .factor-group-legend {
      display: inline-flex;
      gap: var(--space-4);
      text-transform: none;
      letter-spacing: 0;
      font-weight: 500;
      color: var(--text-dimmed);
      font-size: var(--fs-3xs);
    }

    .factor-group-legend .swatch {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 2px;
      margin-right: 4px;
      vertical-align: middle;
    }

    .factor-row {
      display: grid;
      grid-template-columns: 110px 1fr 92px;
      gap: var(--space-3);
      align-items: center;
      padding: 6px 0;
    }

    .factor-name {
      font-size: var(--fs-xs);
      font-weight: 600;
      color: var(--text-body);
      text-align: right;
      line-height: 1.2;
    }

    .factor-cap-hint {
      display: block;
      font-family: var(--font-mono);
      font-size: var(--fs-3xs);
      font-weight: 400;
      color: var(--text-dimmed);
      margin-top: 1px;
    }

    .factor-track {
      position: relative;
      height: 18px;
      background: var(--surface-2);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }

    .factor-fill {
      height: 100%;
      border-radius: var(--radius-sm);
      animation: fadeIn var(--dur-slow) var(--ease-out);
      transition: width var(--dur-base) var(--ease-out);
    }

    .factor-row.driver-strong .factor-fill {
      background: linear-gradient(90deg, var(--gold-500) 0%, var(--gold-300) 100%);
      box-shadow: 0 0 12px -2px rgba(212, 168, 67, 0.35);
    }
    .factor-row.driver-solid .factor-fill {
      background: linear-gradient(90deg, var(--gold-700) 0%, var(--gold-500) 100%);
    }
    .factor-row.driver-weak .factor-fill {
      background: linear-gradient(90deg, var(--gold-800) 0%, var(--gold-700) 100%);
      opacity: 0.8;
    }
    .factor-row.drag .factor-fill {
      background: linear-gradient(90deg, rgba(248, 113, 113, 0.35) 0%, rgba(248, 113, 113, 0.55) 100%);
    }

    .factor-row.driver-strong .factor-name {
      color: var(--gold-300);
    }
    .factor-row.drag .factor-name {
      color: var(--negative);
    }

    .factor-median-tick {
      position: absolute;
      top: -2px;
      bottom: -2px;
      width: 1px;
      background: var(--text-muted);
      opacity: 0.5;
    }

    .factor-median-tick::after {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      width: 5px;
      height: 2px;
      background: var(--text-muted);
      opacity: 0.6;
    }

    .factor-readout {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
    }

    .factor-pp {
      font-size: var(--fs-sm);
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1;
    }

    .factor-util {
      font-size: var(--fs-3xs);
      color: var(--text-dimmed);
      line-height: 1;
    }

    .factor-delta {
      font-size: var(--fs-3xs);
      line-height: 1;
      font-weight: 500;
      padding: 2px 5px;
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
    }
    .factor-delta.positive { color: var(--positive); background: var(--positive-soft); }
    .factor-delta.negative { color: var(--negative); background: var(--negative-soft); }
    .factor-delta.neutral  { color: var(--text-dimmed); }

    .factor-row.driver-strong .factor-pp { color: var(--gold-300); }
    .factor-row.drag .factor-pp { color: var(--negative); }

    .factor-chart-footnote {
      margin-top: var(--space-5);
      padding-top: var(--space-4);
      border-top: 1px solid var(--border-subtle);
      font-size: var(--fs-xs);
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--space-2);
    }

    .factor-chart-footnote strong {
      color: var(--text-body);
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 640px) {
      .factor-row {
        grid-template-columns: 90px 1fr 70px;
        gap: var(--space-2);
      }
      .factor-name { font-size: var(--fs-2xs); }
    }

    /* ===== COURSE DNA LINKBACK ===== */
    .course-dna-link {
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      background: var(--surface-3);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      color: var(--text-body);
      font-size: var(--fs-xs);
      font-weight: 500;
      transition: all var(--dur-fast) var(--ease-out);
      text-decoration: none;
    }

    .course-dna-link:hover {
      background: var(--surface-5);
      border-color: var(--border-gold);
      color: var(--gold-300);
    }

    .course-dna-link svg {
      transition: transform var(--dur-fast) var(--ease-out);
    }

    .course-dna-link:hover svg {
      transform: translateX(2px);
    }

    /* ===== COURSE HISTORY AGGREGATE SUMMARY ===== */
    .course-agg-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: var(--space-3);
      margin-bottom: var(--space-5);
    }

    .course-agg-card {
      background: var(--surface-3);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
      text-align: left;
    }

    .course-agg-card.sg-total {
      border-color: var(--border-gold);
      background: linear-gradient(135deg, rgba(212, 168, 67, 0.06) 0%, var(--surface-3) 60%);
    }

    .course-agg-label {
      font-family: var(--font-mono);
      font-size: var(--fs-3xs);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .course-agg-value {
      font-size: var(--fs-xl);
      font-weight: 700;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
    }

    .course-agg-value.positive { color: var(--positive); }
    .course-agg-value.negative { color: var(--negative); }
    .course-agg-card.sg-total .course-agg-value { color: var(--gold-300); }

    .course-agg-sub {
      font-family: var(--font-mono);
      font-size: var(--fs-3xs);
      color: var(--text-dimmed);
      margin-top: 2px;
    }

    /* ===== TABLE SCROLL HINT (mobile) ===== */
    .table-scroll {
      position: relative;
    }

    .table-scroll-inner {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .table-scroll::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 32px;
      pointer-events: none;
      background: linear-gradient(to right, transparent, var(--surface-1) 80%);
      opacity: 0;
      transition: opacity var(--dur-base) var(--ease-out);
    }

    @media (max-width: 720px) {
      .table-scroll.has-overflow::after {
        opacity: 1;
      }
      .table-scroll-hint-text {
        display: block;
        text-align: center;
        font-family: var(--font-mono);
        font-size: var(--fs-3xs);
        color: var(--text-dimmed);
        padding: var(--space-2) 0 0;
        letter-spacing: var(--tracking-wide);
      }
    }

    .table-scroll-hint-text { display: none; }

    /* ===== COURSE HISTORY TABLE ===== */
    .section-title {
      font-size: var(--fs-2xl);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-4);
    }

    .section-subtitle {
      font-size: var(--fs-md);
      color: var(--text-body);
      margin-bottom: var(--space-5);
    }

    .table-wrap {
      margin-bottom: var(--space-8);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-soft);
      overflow: hidden;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      font-size: var(--fs-xs);
    }

    .table th {
      background: var(--surface-2);
      padding: var(--space-3) var(--space-2);
      font-weight: 600;
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      font-size: var(--fs-3xs);
      color: var(--text-muted);
      text-align: left;
      border-bottom: 1px solid var(--border-base);
    }

    .table td {
      padding: var(--space-3) var(--space-2);
      border-bottom: 1px solid var(--border-soft);
      font-variant-numeric: tabular-nums;
    }

    .table tbody tr:hover {
      background: var(--surface-5);
    }

    .table .num {
      text-align: right;
      font-family: var(--font-mono);
    }

    .table .positive {
      color: var(--positive);
    }

    .table .negative {
      color: var(--negative);
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: var(--space-12);
      color: var(--text-muted);
    }

    .empty-icon {
      font-size: var(--fs-5xl);
      margin-bottom: var(--space-4);
    }

    .empty-heading {
      font-size: var(--fs-xl);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-2);
    }

    .empty-text {
      font-size: var(--fs-md);
      color: var(--text-body);
      margin-bottom: var(--space-6);
      max-width: 50ch;
      margin-left: auto;
      margin-right: auto;
    }

    .btn-browse {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      background: linear-gradient(180deg, var(--gold-400) 0%, var(--gold-600) 100%);
      color: var(--text-on-gold);
      border: 1px solid var(--gold-500);
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: var(--fs-md);
      text-decoration: none;
      transition: all var(--dur-fast) var(--ease-out);
    }

    .btn-browse:hover {
      background: linear-gradient(180deg, var(--gold-300) 0%, var(--gold-500) 100%);
      border-color: var(--gold-400);
      transform: translateY(-1px);
    }

    /* ===== MARKET POSITIONING ===== */
    .market-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: var(--space-4);
    }

    .market-card {
      background: var(--surface-3);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      padding: var(--space-4);
    }

    .market-label {
      font-family: var(--font-mono);
      font-size: var(--fs-3xs);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: var(--space-2);
    }

    .market-value {
      font-size: var(--fs-lg);
      font-weight: 700;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }

    /* ===== SG FINGERPRINT ===== */
    @keyframes fingerprint-morph {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes vertex-halo-pulse {
      0%, 100% {
        r: 8;
        opacity: 0.2;
      }
      50% {
        r: 14;
        opacity: 0.6;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      @keyframes fingerprint-morph {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes vertex-halo-pulse {
        from { opacity: 0; }
        to { opacity: 0; }
      }
    }

    .sg-vertex-dot {
      cursor: pointer;
      transition: r var(--dur-fast) var(--ease-out);
    }

    .sg-vertex-dot:hover {
      filter: drop-shadow(0 0 4px var(--gold-300));
    }

    .sg-vertex-tooltip {
      font-family: var(--font-mono);
      font-size: var(--fs-xs);
      font-weight: 600;
      fill: var(--text-primary);
      pointer-events: none;
      opacity: 0;
      transition: opacity var(--dur-fast) var(--ease-out);
    }

    .sg-vertex-group:hover .sg-vertex-tooltip {
      opacity: 1;
    }

    /* ===== COMBINED SIGNALS SECTION ===== */
    .signals-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(0, 1fr);
      gap: var(--space-6);
      align-items: start;
    }

    @media (max-width: 880px) {
      .signals-grid {
        grid-template-columns: 1fr;
      }
    }

    .signals-col {
      background: var(--surface-3);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
    }

    .signals-col-title {
      font-family: var(--font-mono);
      font-size: var(--fs-3xs);
      font-weight: 600;
      letter-spacing: var(--tracking-widest);
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: var(--space-2);
    }

    .signals-col-heading {
      font-size: var(--fs-lg);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-1);
      line-height: var(--lh-tight);
    }

    .signals-col-caption {
      font-size: var(--fs-sm);
      color: var(--text-body);
      margin-bottom: var(--space-4);
      line-height: var(--lh-snug);
    }

    /* SG Fingerprint chart inside its column */
    .fingerprint-chart {
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    .fingerprint-narrative {
      font-size: var(--fs-sm);
      color: var(--text-body);
      text-align: center;
      line-height: var(--lh-relaxed);
      margin-top: var(--space-4);
      padding-top: var(--space-4);
      border-top: 1px dashed var(--border-subtle);
    }

    /* Pressure gauges stacked vertically in the right column */
    .gauges-stack {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .gauges-stack .gauge-card {
      background: var(--surface-2);
    }

    /* ===== PRESSURE METRICS GAUGES (Pass 3 — tightened) ===== */
    .gauges-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }

    .gauge-card {
      background: var(--surface-3);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      text-align: center;
      transition: opacity var(--dur-base) var(--ease-out);
    }

    .gauge-card[style*="opacity: 0.5"] {
      background: var(--surface-2);
    }

    .gauge-title {
      font-size: var(--fs-md);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-2);
    }

    .gauge-svg-wrap {
      max-width: 220px;
      margin: 0 auto;
    }

    .gauge-value {
      font-size: var(--fs-xl);
      font-weight: 700;
      color: var(--gold-300);
      font-variant-numeric: tabular-nums;
      margin-top: var(--space-1);
      margin-bottom: 2px;
      line-height: 1.1;
    }

    .gauge-sample {
      font-family: var(--font-mono);
      font-size: var(--fs-3xs);
      color: var(--text-dimmed);
      margin-bottom: var(--space-2);
    }

    .gauge-microcopy {
      font-size: var(--fs-sm);
      color: var(--text-body);
      line-height: var(--lh-snug);
      max-width: 22ch;
      margin: 0 auto;
    }

    .gauge-empty {
      font-size: var(--fs-sm);
      color: var(--text-muted);
      padding: var(--space-5) var(--space-2);
      line-height: var(--lh-relaxed);
    }

    .gauge-empty-hint {
      display: block;
      font-family: var(--font-mono);
      font-size: var(--fs-3xs);
      color: var(--text-dimmed);
      margin-top: var(--space-2);
    }

    @media (max-width: 768px) {
      .player-full-name { font-size: var(--fs-3xl); }
      .snapshot-rank { font-size: var(--fs-4xl); }
      .factor-label { width: 90px; font-size: var(--fs-2xs); }
      .gauges-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="container">
    <div id="playerContent"></div>
  </main>

  <div id="site-footer"></div>

  <script src="assets/js/core.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/animations.js"></script>
  <script src="assets/js/data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await BBI.renderHeader('player.html');
      await BBI.renderFooter();

      const mount = $('#playerContent');

      // Parse URL params: ?id=18417 or ?slug=scheffler-scottie
      const params = new URLSearchParams(window.location.search);
      const dg_id = params.get('id');
      const slug = params.get('slug');

      // Load rankings and supporting data
      const [rankings, currentEvent, dfsData, courseHistory, recentForm, tourBaselines, pressureMetrics] = await Promise.all([
        BBI.data.load(BBI.data.paths.bbiRankings),
        BBI.data.load(BBI.data.paths.currentEvent),
        BBI.data.load(BBI.data.paths.dfsLineups),
        BBI.data.load(BBI.data.paths.playerCourseHistory),
        BBI.data.load(BBI.data.paths.playerRecentForm),
        BBI.data.load(BBI.data.paths.tourSgBaselines),
        BBI.data.load(BBI.data.paths.playerPressureMetrics)
      ]);

      if (!rankings || !rankings.players) {
        mount.innerHTML = renderEmptyState('Data loading error', 'Unable to load player rankings.');
        return;
      }

      // Resolve player from id or slug
      let player = null;
      if (dg_id) {
        player = rankings.players.find(p => String(p.dg_id) === String(dg_id));
      } else if (slug) {
        player = rankings.players.find(p => {
          const playerSlug = p.name.toLowerCase().replace(/\s+/g, '-').replace(',', '');
          return playerSlug === slug;
        });
      }

      if (!player) {
        mount.innerHTML = renderEmptyState(
          'Player not found',
          dg_id || slug
            ? `Player "${dg_id || slug}" not in the current field.`
            : 'No player selected. Use the rankings page to browse players.'
        );
        return;
      }

      // Build content
      const playerRank = rankings.players.findIndex(p => p.dg_id === player.dg_id) + 1;
      const html = renderPlayer(player, playerRank, rankings, currentEvent, dfsData, courseHistory, recentForm, tourBaselines, pressureMetrics);
      mount.innerHTML = html;

      // Wire up Pass 2 wayfinding interactions
      wireWayfinding(rankings, player, playerRank);

      // Pass 3: detect overflowing tables for mobile scroll hint
      const detectOverflow = () => {
        document.querySelectorAll('.table-scroll').forEach(wrap => {
          const inner = wrap.querySelector('.table-scroll-inner');
          if (!inner) return;
          const hasOverflow = inner.scrollWidth > inner.clientWidth + 2;
          wrap.classList.toggle('has-overflow', hasOverflow);
        });
      };
      detectOverflow();
      window.addEventListener('resize', detectOverflow);
    });

    // ---------- Pass 2 wayfinding wiring ----------
    function wireWayfinding(rankings, currentPlayer, currentRank) {
      const players = rankings.players || [];
      const totalPlayers = players.length;
      const prevPlayer = currentRank > 1 ? players[currentRank - 2] : null;
      const nextPlayer = currentRank < totalPlayers ? players[currentRank] : null;

      // --- Sticky mini-strip: reveal when main player-header scrolls out of view ---
      const mainHeader = document.getElementById('playerMainHeader');
      const miniStrip = document.getElementById('playerMiniStrip');
      if (mainHeader && miniStrip && 'IntersectionObserver' in window) {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              miniStrip.classList.remove('visible');
              miniStrip.setAttribute('aria-hidden', 'true');
            } else {
              miniStrip.classList.add('visible');
              miniStrip.setAttribute('aria-hidden', 'false');
            }
          });
        }, { rootMargin: '-80px 0px 0px 0px', threshold: 0 });
        observer.observe(mainHeader);
      }

      // --- Mini-strip prev/next buttons ---
      const miniPrev = miniStrip?.querySelector('[data-nav="prev"]');
      const miniNext = miniStrip?.querySelector('[data-nav="next"]');
      if (miniPrev && prevPlayer) miniPrev.addEventListener('click', () => { location.href = `player.html?id=${prevPlayer.dg_id}`; });
      if (miniNext && nextPlayer) miniNext.addEventListener('click', () => { location.href = `player.html?id=${nextPlayer.dg_id}`; });

      // --- Keyboard: ← → cycle players, / focuses search ---
      document.addEventListener('keydown', (e) => {
        // Ignore when typing in an input/textarea
        const activeTag = document.activeElement?.tagName;
        const isTyping = activeTag === 'INPUT' || activeTag === 'TEXTAREA';

        if (e.key === '/' && !isTyping && !e.metaKey && !e.ctrlKey) {
          e.preventDefault();
          const input = document.getElementById('playerComboboxInput');
          if (input) { input.focus(); input.select(); }
        }
        if (!isTyping && !e.metaKey && !e.ctrlKey && !e.altKey) {
          if (e.key === 'ArrowLeft' && prevPlayer) {
            e.preventDefault();
            location.href = `player.html?id=${prevPlayer.dg_id}`;
          } else if (e.key === 'ArrowRight' && nextPlayer) {
            e.preventDefault();
            location.href = `player.html?id=${nextPlayer.dg_id}`;
          }
        }
      });

      // --- Combobox: filter + navigate to selected player ---
      const input = document.getElementById('playerComboboxInput');
      const menu = document.getElementById('playerComboboxMenu');
      if (!input || !menu) return;

      let activeIdx = -1;
      let currentMatches = [];

      const render = (filter) => {
        const q = filter.trim().toLowerCase();
        const matches = q
          ? players.map((p, i) => ({ p, i })).filter(({ p }) => p.name.toLowerCase().includes(q)).slice(0, 20)
          : players.map((p, i) => ({ p, i })).slice(0, 10);

        currentMatches = matches;
        activeIdx = matches.length ? 0 : -1;

        if (!matches.length) {
          menu.innerHTML = `<div class="player-combobox-empty">No players match "${q}".</div>`;
          menu.classList.add('open');
          return;
        }

        menu.innerHTML = matches.map(({ p, i }, mIdx) => `
          <div class="player-combobox-item ${mIdx === activeIdx ? 'active' : ''}" data-dg-id="${p.dg_id}" role="option" tabindex="-1">
            <span class="rank">#${i + 1}</span>
            <span>${p.name}</span>
            <span class="tier-mini">${p.tier || 'NEUTRAL'}</span>
          </div>
        `).join('');
        menu.classList.add('open');
      };

      const setActive = (idx) => {
        activeIdx = Math.max(0, Math.min(currentMatches.length - 1, idx));
        menu.querySelectorAll('.player-combobox-item').forEach((el, i) => {
          el.classList.toggle('active', i === activeIdx);
          if (i === activeIdx) el.scrollIntoView({ block: 'nearest' });
        });
      };

      input.addEventListener('focus', () => render(input.value));
      input.addEventListener('input', (e) => {
        let t = input._debounce;
        clearTimeout(t);
        input._debounce = setTimeout(() => render(input.value), 80);
      });
      input.addEventListener('blur', () => {
        // Delay so clicks on menu items register before close
        setTimeout(() => menu.classList.remove('open'), 150);
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowDown') { e.preventDefault(); setActive(activeIdx + 1); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); setActive(activeIdx - 1); }
        else if (e.key === 'Enter' && activeIdx >= 0 && currentMatches[activeIdx]) {
          e.preventDefault();
          location.href = `player.html?id=${currentMatches[activeIdx].p.dg_id}`;
        } else if (e.key === 'Escape') {
          input.blur();
          menu.classList.remove('open');
        }
      });

      menu.addEventListener('mousedown', (e) => {
        const item = e.target.closest('.player-combobox-item');
        if (!item) return;
        e.preventDefault(); // prevent blur from closing menu before click
        const dgId = item.getAttribute('data-dg-id');
        location.href = `player.html?id=${dgId}`;
      });
    }

    function renderEmptyState(heading, message) {
      return `
        <div class="empty-state">
          <div class="empty-icon">○</div>
          <div class="empty-heading">${heading}</div>
          <div class="empty-text">${message}</div>
          <a href="rankings.html" class="btn-browse">Browse Rankings</a>
        </div>
      `;
    }

    function renderPlayer(player, rank, rankings, currentEvent, dfsData, courseHistory, recentForm, tourBaselines, pressureMetrics) {
      const mode = 'dfs';
      const bbi = player.bbi_dfs;
      const decomp = player.dfs_decomp;
      const weights = rankings.weights_dfs;

      // Field maxes for prob mini-bars + field medians for factor baselines
      const fieldMaxes = computeFieldMaxes(rankings.players || []);
      const fieldMedians = computeFactorFieldMedians(rankings.players || [], mode, weights);

      // Find DFS salary/ownership
      const dfsRecord = dfsData && dfsData.lineups
        ? dfsData.lineups.flatMap(l => l.lineup || []).find(p => p.dg_id === player.dg_id)
        : null;

      // Generate narrative from top 2-3 factors (excluding adjustment factors)
      const factorEntries = Object.entries(decomp || {})
        .filter(([k, v]) => k !== 'leverage' && k !== 'contrarian' && v > 0)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 2);

      const firstName = (player.name || '').split(',')[1]?.trim() || (player.name || '').split(' ')[0] || 'This player';
      const prettyFactor = k => ({ talent: 'Talent', courseFit: 'Course Fit', form: 'Form', cutSafety: 'Cut Safety', floor: 'Floor', ceiling: 'Ceiling', leverage: 'Leverage', contrarian: 'Contrarian', dfsValue: 'DFS Value', strategic: 'Strategic' }[k] || k);
      const tldr = factorEntries.length >= 2
        ? `${firstName} is your #${rank} pick at ${rankings.course || 'this venue'} — ${prettyFactor(factorEntries[0][0])} and ${prettyFactor(factorEntries[1][0])} carry the composite.`
        : `${firstName} ranks #${rank} with a composite score of ${fmt.num(bbi, 2)}.`;

      const tierClass = (player.tier || 'NEUTRAL').toLowerCase();

      // Combined Signals section: SG Fingerprint (left) + Pressure/Surge stacked (right)
      const fingerprintHtml = buildSgFingerprint(player, tourBaselines);
      const pressureHtml = buildPressureMetrics(player, pressureMetrics);
      const signalsHtml = buildSignalsSection(fingerprintHtml, pressureHtml);

      // Recent form
      const recentFormHtml = buildRecentForm(player, recentForm);

      // Course history
      const courseHistHtml = buildCourseHistory(player, courseHistory, rankings, currentEvent);

      // Market positioning
      const marketHtml = player.salary ? `
        <section class="section">
          <div class="section-head">
            <h2 class="section-title">Market Positioning</h2>
            <p class="section-subtitle">DraftKings salary, projected ownership, and implied value.</p>
          </div>
          <div class="market-grid">
            <div class="market-card">
              <div class="market-label">Salary</div>
              <div class="market-value">$${(player.salary / 1000).toFixed(1)}k</div>
            </div>
            <div class="market-card">
              <div class="market-label">Proj. Ownership</div>
              <div class="market-value">${fmt.pct(player.proj_own, 1)}</div>
            </div>
            <div class="market-card">
              <div class="market-label">Implied Value</div>
              <div class="market-value">${fmt.num(player.value, 2)}</div>
            </div>
          </div>
        </section>
      ` : '';

      // Prev/next computation — cycle by BBI rank within current field
      const totalPlayers = rankings.players.length;
      const prevRank = rank > 1 ? rank - 1 : null;
      const nextRank = rank < totalPlayers ? rank + 1 : null;
      const prevPlayer = prevRank ? rankings.players[prevRank - 1] : null;
      const nextPlayer = nextRank ? rankings.players[nextRank - 1] : null;

      return `
        <!-- WAYFINDING: sticky mini-strip (hidden until main header scrolls off) -->
        <div class="player-mini-strip" id="playerMiniStrip" aria-hidden="true">
          <span class="mini-rank">#${rank}</span>
          <div>

    // ---------- Pass 1 helpers ----------
    function computeFieldMaxes(players) {
      const keys = ['win_pct', 'top_5', 'top_10', 'top_20', 'make_cut'];
      const out = {};
      keys.forEach(k => {
        const vals = players.map(p => p[k]).filter(v => v != null && !isNaN(v));
        out[k === 'win_pct' ? 'win' : k] = vals.length ? Math.max(...vals) : 100;
      });
      return out;
    }

    // Field-median utilization per factor (across all players) — baseline tick.
    function computeFactorFieldMedians(players, mode, weights) {
      if (!players.length || !weights) return {};
      const decompKey = 'dfs_decomp';
      const medians = {};
      Object.keys(weights).forEach(factor => {
        const cap = (weights[factor] || 0) * 100;
        if (cap <= 0) { medians[factor] = 0; return; }
        const utils = players
          .map(p => (p[decompKey]?.[factor] ?? 0) / cap)
          .filter(u => !isNaN(u))
          .sort((a, b) => a - b);
        medians[factor] = utils.length ? utils[Math.floor(utils.length / 2)] : 0;
      });
      return medians;
    }

    function renderProbCell(label, value, fieldMax) {
      if (value == null || isNaN(value)) {
        return `
          <div class="prob-cell">
            <div class="prob-label">${label}</div>
            <div class="prob-value">—</div>
          </div>
        `;
      }
      const max = Math.max(fieldMax || 0, value, 0.1); // avoid div-by-zero
      const fillPct = Math.min(100, (value / max) * 100);
      const isLeader = fieldMax != null && Math.abs(value - fieldMax) < 0.001;
      return `
        <div class="prob-cell${isLeader ? ' is-leader' : ''}">
          <div class="prob-label">${label}</div>
          <div class="prob-value">${fmt.pct(value, 1)}</div>
          <div class="prob-fieldmax">field max ${fmt.pct(fieldMax, 1)}</div>
          <div class="prob-bar" role="progressbar" aria-valuenow="${value}" aria-valuemax="${fieldMax}">
            <div class="prob-bar-fill" style="width: ${fillPct}%;"></div>
          </div>
        </div>
      `;
    }

    function renderFactorDecomp(decomp, weights, mode, bbi, fieldMedians) {
      if (!decomp || !weights) return '';

      const prettyFactor = k => ({
        talent: 'Talent', courseFit: 'Course Fit', form: 'Form', cutSafety: 'Cut Safety',
        floor: 'Floor', ceiling: 'Ceiling', leverage: 'Leverage', contrarian: 'Contrarian',
        dfsValue: 'DFS Value', strategic: 'Strategic'
      }[k] || k);

      const PRIMARY = ['talent', 'courseFit', 'form', 'cutSafety', 'floor', 'ceiling', 'dfsValue', 'strategic'];
      const ADJUST = ['leverage', 'contrarian'];

      const buildRow = (key) => {
        const pp = decomp[key] ?? 0;
        const cap = (weights[key] || 0) * 100;
        const util = cap > 0 ? Math.max(0, Math.min(1, pp / cap)) : 0;
        const medianUtil = fieldMedians[key] ?? 0.5;
        const medianPp = medianUtil * cap;
        const deltaPp = pp - medianPp;
        let cls;
        if (util >= 0.85) cls = 'driver-strong';
        else if (util >= 0.60) cls = 'driver-solid';
        else if (util >= 0.30) cls = 'driver-weak';
        else cls = 'drag';
        // leverage and contrarian are small-impact by design — don't red-flag them
        if (ADJUST.includes(key)) cls = 'driver-weak';
        // Delta class — require ≥0.1pp difference to register as non-neutral
        const deltaCls = Math.abs(deltaPp) < 0.1 ? 'neutral' : deltaPp > 0 ? 'positive' : 'negative';
        const deltaLabel = Math.abs(deltaPp) < 0.1
          ? 'at field avg'
          : `${deltaPp > 0 ? '+' : ''}${fmt.num(deltaPp, 1)} vs field`;
        return `
          <div class="factor-row ${cls}">
            <div class="factor-name">
              ${prettyFactor(key)}
              <span class="factor-cap-hint">max ${fmt.num(cap, 1)}</span>
            </div>
            <div class="factor-track" title="${prettyFactor(key)}: ${fmt.num(pp, 2)} of ${fmt.num(cap, 1)} cap (${fmt.num(util * 100, 0)}% utilized · field median ${fmt.num(medianUtil * 100, 0)}% = ${fmt.num(medianPp, 2)}pp)">
              <div class="factor-fill" style="width: ${util * 100}%;"></div>
              ${!ADJUST.includes(key) && medianUtil > 0.03 ? `<span class="factor-median-tick" style="left: ${medianUtil * 100}%;" aria-label="Field median"></span>` : ''}
            </div>
            <div class="factor-readout">
              <span class="factor-pp">${fmt.num(pp, 2)}</span>
              <span class="factor-delta ${deltaCls}">${deltaLabel}</span>
            </div>
          </div>
        `;
      };

      const primarySorted = PRIMARY
        .filter(k => k in decomp)
        .sort((a, b) => (decomp[b] ?? 0) - (decomp[a] ?? 0));
      const adjustSorted = ADJUST
        .filter(k => k in decomp)
        .sort((a, b) => (decomp[b] ?? 0) - (decomp[a] ?? 0));

      const decompSum = Object.values(decomp).reduce((a, b) => a + b, 0);

      return `
        <div class="factor-chart-wrapper">
          <div class="factor-chart-head">
            <h3 class="factor-chart-title">Factor Decomposition</h3>
            <p class="factor-chart-caption">Each bar shows what this factor contributed to the composite score, relative to its maximum possible weight. Tick mark = field median.</p>
          </div>

          <div class="factor-group">
            <div class="factor-group-label">
              <span>Primary factors <span style="color: var(--text-dimmed); font-weight: 400;">· sorted by contribution</span></span>
              <span class="factor-group-legend">
                <span><span class="swatch" style="background: linear-gradient(90deg, var(--gold-500), var(--gold-300));"></span>strong driver</span>
                <span><span class="swatch" style="background: linear-gradient(90deg, var(--gold-800), var(--gold-700));"></span>weak</span>
                <span><span class="swatch" style="background: rgba(248, 113, 113, 0.55);"></span>drag</span>
              </span>
            </div>
            ${primarySorted.map(buildRow).join('')}
          </div>

          ${adjustSorted.length ? `
            <div class="factor-group">
              <div class="factor-group-label">
                <span>Adjustments <span style="color: var(--text-dimmed); font-weight: 400;">· small-impact by design</span></span>
              </div>
              ${adjustSorted.map(buildRow).join('')}
            </div>
          ` : ''}

          <div class="factor-chart-footnote">
            <span>Composite score <strong>${fmt.num(bbi, 2)}</strong></span>
            <span>Sum of factor bars: <strong>${fmt.num(decompSum, 2)}</strong></span>
          </div>
        </div>
      `;
    }

    function buildPressureMetrics(player, pressureMetrics) {
      if (!pressureMetrics || !pressureMetrics.tour_baselines) {
        return '';
      }

      const playerData = pressureMetrics.players[player.dg_id];
      const baselines = pressureMetrics.tour_baselines;

      // Helper: render an arc gauge
      function renderArcGauge(title, metric, value, sample, baseline, microcopy) {
        const hasData = value !== null && sample >= 3;
        const tourAvg = baseline.avg;
        const p25 = baseline.p25;
        const p50 = baseline.p50;
        const p75 = baseline.p75;

        // Scale from tour range to arc
        const minVal = p25;
        const maxVal = p75;
        const range = maxVal - minVal || 1;
        const normalized = (value - minVal) / range;
        const clipped = Math.max(0, Math.min(1, normalized));

        // Convert to angle: -90deg (left) to +90deg (right) on a 180deg arc
        const angle = -90 + clipped * 180;
        const angleRad = angle * Math.PI / 180;

        // SVG params
        const size = 240;
        const cx = size / 2;
        const cy = size / 2;
        const radius = 70;

        // Arc path: half-circle from left to right
        const startAngle = -90 * Math.PI / 180;
        const endAngle = 90 * Math.PI / 180;
        const x1 = cx + radius * Math.cos(startAngle);
        const y1 = cy + radius * Math.sin(startAngle);
        const x2 = cx + radius * Math.cos(endAngle);
        const y2 = cy + radius * Math.sin(endAngle);

        // Needle position
        const needleX = cx + radius * Math.cos(angleRad);
        const needleY = cy + radius * Math.sin(angleRad);

        // Arc fill: from start to needle
        const largeArc = (angle - (-90)) > 180 ? 1 : 0;
        const arcX = cx + radius * Math.cos(angleRad);
        const arcY = cy + radius * Math.sin(angleRad);
        const arcPath = `M ${x1} ${y1} A ${radius} ${radius} 0 ${largeArc} 1 ${arcX} ${arcY}`;

        // Tick angles: p50 and player value
        const p50Angle = -90 + ((p50 - minVal) / range) * 180;
        const p50AngleRad = p50Angle * Math.PI / 180;
        const p50X = cx + radius * Math.cos(p50AngleRad);
        const p50Y = cy + radius * Math.sin(p50AngleRad);

        return `
          <div class="gauge-card" ${!hasData ? 'style="opacity: 0.5;"' : ''}>
            <div class="gauge-title">${title}</div>
            <div class="gauge-svg-wrap">
            <svg width="100%" height="160" viewBox="0 0 240 200" preserveAspectRatio="xMidYMid meet" style="display: block;">
              <!-- Arc background (light) -->
              <path d="M ${x1} ${y1} A ${radius} ${radius} 0 1 1 ${x2} ${y2}" fill="none" stroke="var(--border-soft)" stroke-width="8" opacity="0.3"/>

              <!-- Arc fill (gold gradient) -->
              ${hasData ? `
                <defs>
                  <linearGradient id="arcGrad-${metric}" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color: var(--gold-500); stop-opacity: 1" />
                    <stop offset="100%" style="stop-color: var(--gold-300); stop-opacity: 1" />
                  </linearGradient>
                </defs>
                <path d="${arcPath}" fill="none" stroke="url(#arcGrad-${metric})" stroke-width="8" stroke-linecap="round"/>
              ` : ''}

              <!-- Tour median tick (gold) -->
              <line x1="${p50X}" y1="${p50Y}" x2="${p50X + 8 * Math.cos(p50AngleRad)}" y2="${p50Y + 8 * Math.sin(p50AngleRad)}" stroke="var(--gold-400)" stroke-width="2" opacity="0.6"/>

              <!-- Needle (if data) -->
              ${hasData ? `
                <line x1="${cx}" y1="${cy}" x2="${needleX}" y2="${needleY}" stroke="var(--gold-300)" stroke-width="2" stroke-linecap="round" style="animation: needle-sweep 800ms cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; opacity: 0;">
                  <style>
                    @keyframes needle-sweep {
                      to { opacity: 1; }
                    }
                    @media (prefers-reduced-motion: reduce) {
                      @keyframes needle-sweep {
                        from { opacity: 0; }
                        to { opacity: 0; }
                      }
                    }
                  </style>
                </line>
              ` : ''}
            </svg>
            </div>
            ${hasData ? `
              <div class="gauge-value">${value > 0 ? '+' : ''}${fmt.num(value, 2)} SG</div>
              <div class="gauge-sample">n=${sample} rounds</div>
              <div class="gauge-microcopy">${microcopy}</div>
            ` : `
              <div class="gauge-empty">
                Need a few more rounds before this metric lights up.
                <span class="gauge-empty-hint">at least 3 events tracked</span>
              </div>
            `}
          </div>
        `;
      }

      let pressureMicroCopy = 'Tour-average pressure response';
      if (playerData && playerData.pressure_sunday) {
        const ps = playerData.pressure_sunday.value;
        if (ps > baselines.pressure_sunday.p75) pressureMicroCopy = 'Steps up when it counts';
        else if (ps < baselines.pressure_sunday.p25) pressureMicroCopy = 'Fades in the final round';
      }

      let surgeMicroCopy = 'Even-keeled';
      if (playerData && playerData.weekend_surge) {
        const ws = playerData.weekend_surge.value;
        if (ws > baselines.weekend_surge.p75) surgeMicroCopy = 'Grinds on the weekend';
        else if (ws < baselines.weekend_surge.p25) surgeMicroCopy = 'Coasts on first-half lead';
      }

      const psValue = playerData && playerData.pressure_sunday ? playerData.pressure_sunday.value : null;
      const psSample = playerData && playerData.pressure_sunday ? playerData.pressure_sunday.sample : 0;
      const wsValue = playerData && playerData.weekend_surge ? playerData.weekend_surge.value : null;
      const wsSample = playerData && playerData.weekend_surge ? playerData.weekend_surge.sample : 0;

      // Return the two gauges as a vertically-stacked pair (for the combined Signals section)
      return `
        <div class="gauges-stack">
          ${renderArcGauge('Sunday Performance', 'pressure_sunday', psValue, psSample, baselines.pressure_sunday, pressureMicroCopy)}
          ${renderArcGauge('Weekend Surge', 'weekend_surge', wsValue, wsSample, baselines.weekend_surge, surgeMicroCopy)}
        </div>
      `;
    }

    function buildSgFingerprint(player, tourBaselines) {
      if (!tourBaselines || !tourBaselines.sg_ott) {
        return ''; // Skip if no baselines
      }

      // Get player's current season SG values (use historical if available, else tour avg)
      const sgOtt = player.sg_ott || (player.hist_sg_ott || 0);
      const sgApp = player.sg_app || (player.hist_sg_app || 0);
      const sgArg = player.sg_arg || (player.hist_sg_arg || 0);
      const sgPutt = player.sg_putt || (player.hist_sg_putt || 0);

      // Compute percentiles (0-100 scale based on tour)
      const computePercentile = (value, baseline) => {
        if (!baseline) return 50;
        const { min, max } = baseline;
        const span = max - min || 1;
        return Math.min(100, Math.max(0, ((value - min) / span) * 100));
      };

      const pctOtt = computePercentile(sgOtt, tourBaselines.sg_ott);
      const pctApp = computePercentile(sgApp, tourBaselines.sg_app);
      const pctArg = computePercentile(sgArg, tourBaselines.sg_arg);
      const pctPutt = computePercentile(sgPutt, tourBaselines.sg_putt);

      // Normalize to 0-1 for radial distance (50% = center, 0% = inner, 100% = outer)
      const r1 = pctOtt / 100;
      const r2 = pctApp / 100;
      const r3 = pctArg / 100;
      const r4 = pctPutt / 100;

      // SVG params
      const size = 280;
      const centerX = size / 2;
      const centerY = size / 2;
      const ringMax = 100;

      // Compute polygon points (starting at 12 o'clock, going clockwise)
      // Axes: OTT (top), APP (right), ARG (bottom), PUTT (left)
      const pt = (angle, dist) => {
        const rad = (angle - 90) * Math.PI / 180;
        return [centerX + dist * Math.cos(rad), centerY + dist * Math.sin(rad)];
      };

      const p1 = pt(0, r1 * ringMax);    // OTT
      const p2 = pt(90, r2 * ringMax);   // APP
      const p3 = pt(180, r3 * ringMax);  // ARG
      const p4 = pt(270, r4 * ringMax);  // PUTT

      const polyPoints = [p1, p2, p3, p4].map(p => p.join(',')).join(' ');

      // Morph 1: Compute tour-average shape (all at 50th percentile)
      const tourAvgShape = [
        pt(0, 0.5 * ringMax),    // OTT at 50th percentile
        pt(90, 0.5 * ringMax),   // APP at 50th percentile
        pt(180, 0.5 * ringMax),  // ARG at 50th percentile
        pt(270, 0.5 * ringMax)   // PUTT at 50th percentile
      ].map(p => p.join(',')).join(' ');

      // Identify strongest vertex for halo pulse
      const percentiles = [
        { axis: 'OTT', pct: pctOtt, p: p1 },
        { axis: 'APP', pct: pctApp, p: p2 },
        { axis: 'ARG', pct: pctArg, p: p3 },
        { axis: 'PUTT', pct: pctPutt, p: p4 }
      ];
      const strongestVertex = percentiles.reduce((a, b) => a.pct > b.pct ? a : b);
      const shouldPulse = strongestVertex.pct > 50; // Only pulse if above tour avg

      // Build narrative with enhanced context
      const narrative = buildFingerPrintNarrative(
        player,
        sgOtt, sgApp, sgArg, sgPutt,
        pctOtt, pctApp, pctArg, pctPutt,
        tourBaselines
      );

      const svgId = `sg-fingerprint-${player.dg_id}`;

      // Return just the inner chart HTML (section wrapping + subtitle handled by buildSignalsSection)
      return `
        <div class="fingerprint-chart">
          <div style="display: flex; justify-content: center;">
            <svg id="${svgId}" width="100%" height="320" viewBox="0 0 280 280" style="max-width: 420px; margin: 0 auto;">
              <!-- Reference rings -->
              <circle cx="140" cy="140" r="20" fill="none" stroke="var(--border-soft)" stroke-width="1" opacity="0.4"/>
              <circle cx="140" cy="140" r="40" fill="none" stroke="var(--border-soft)" stroke-width="1" opacity="0.6"/>
              <text x="148" y="144" font-size="10" fill="var(--text-muted)" font-family="var(--font-mono)">Tour avg</text>
              <circle cx="140" cy="140" r="60" fill="none" stroke="var(--border-soft)" stroke-width="1" opacity="0.4"/>
              <circle cx="140" cy="140" r="80" fill="none" stroke="var(--border-soft)" stroke-width="1" opacity="0.4"/>

              <!-- Ghost tour-average outline (differentiator 2) -->
              <polygon points="${tourAvgShape}" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-dasharray="3,4" opacity="0.3"/>

              <!-- Axes labels -->
              <text x="140" y="25" text-anchor="middle" font-size="12" font-weight="500" fill="var(--text-primary)">OTT</text>
              <text x="140" y="45" text-anchor="middle" font-size="11" font-family="var(--font-mono)" fill="var(--text-muted)">${fmt.num(sgOtt, 2)}</text>

              <text x="255" y="147" text-anchor="start" font-size="12" font-weight="500" fill="var(--text-primary)">APP</text>
              <text x="255" y="165" text-anchor="start" font-size="11" font-family="var(--font-mono)" fill="var(--text-muted)">${fmt.num(sgApp, 2)}</text>

              <text x="140" y="270" text-anchor="middle" font-size="12" font-weight="500" fill="var(--text-primary)">ARG</text>
              <text x="140" y="288" text-anchor="middle" font-size="11" font-family="var(--font-mono)" fill="var(--text-muted)">${fmt.num(sgArg, 2)}</text>

              <text x="25" y="147" text-anchor="end" font-size="12" font-weight="500" fill="var(--text-primary)">PUTT</text>
              <text x="25" y="165" text-anchor="end" font-size="11" font-family="var(--font-mono)" fill="var(--text-muted)">${fmt.num(sgPutt, 2)}</text>

              <!-- Player polygon with morph animation (differentiator 1) -->
              <polygon points="${polyPoints}" fill="var(--gold-400)" fill-opacity="0.15" stroke="var(--gold-400)" stroke-width="2" style="animation: fingerprint-morph 1.2s ease-out forwards; opacity: 0;">
                <animate attributeName="points" from="${tourAvgShape}" to="${polyPoints}" dur="1.2s" fill="freeze" />
              </polygon>

              <!-- Vertex groups with hover reveal (differentiator 4) -->
              <g class="sg-vertex-group">
                <circle cx="${p1[0]}" cy="${p1[1]}" r="4" class="sg-vertex-dot" fill="var(--gold-400)" opacity="0.9" style="animation: ${shouldPulse && strongestVertex.axis === 'OTT' ? 'vertex-halo-pulse 2s ease-in-out infinite' : 'none'};"/>
                ${shouldPulse && strongestVertex.axis === 'OTT' ? `<circle cx="${p1[0]}" cy="${p1[1]}" r="8" fill="none" stroke="var(--gold-400)" opacity="0" style="animation: vertex-halo-pulse 2s ease-in-out infinite;"/>` : ''}
                <title>OTT: ${fmt.num(sgOtt, 2)} (top ${fmt.num(100 - pctOtt, 0)}%)</title>
              </g>

              <g class="sg-vertex-group">
                <circle cx="${p2[0]}" cy="${p2[1]}" r="4" class="sg-vertex-dot" fill="var(--gold-400)" opacity="0.9" style="animation: ${shouldPulse && strongestVertex.axis === 'APP' ? 'vertex-halo-pulse 2s ease-in-out infinite' : 'none'};"/>
                ${shouldPulse && strongestVertex.axis === 'APP' ? `<circle cx="${p2[0]}" cy="${p2[1]}" r="8" fill="none" stroke="var(--gold-400)" opacity="0" style="animation: vertex-halo-pulse 2s ease-in-out infinite;"/>` : ''}
                <title>APP: ${fmt.num(sgApp, 2)} (top ${fmt.num(100 - pctApp, 0)}%)</title>
              </g>

              <g class="sg-vertex-group">
                <circle cx="${p3[0]}" cy="${p3[1]}" r="4" class="sg-vertex-dot" fill="var(--gold-400)" opacity="0.9" style="animation: ${shouldPulse && strongestVertex.axis === 'ARG' ? 'vertex-halo-pulse 2s ease-in-out infinite' : 'none'};"/>
                ${shouldPulse && strongestVertex.axis === 'ARG' ? `<circle cx="${p3[0]}" cy="${p3[1]}" r="8" fill="none" stroke="var(--gold-400)" opacity="0" style="animation: vertex-halo-pulse 2s ease-in-out infinite;"/>` : ''}
                <title>ARG: ${fmt.num(sgArg, 2)} (top ${fmt.num(100 - pctArg, 0)}%)</title>
              </g>

              <g class="sg-vertex-group">
                <circle cx="${p4[0]}" cy="${p4[1]}" r="4" class="sg-vertex-dot" fill="var(--gold-400)" opacity="0.9" style="animation: ${shouldPulse && strongestVertex.axis === 'PUTT' ? 'vertex-halo-pulse 2s ease-in-out infinite' : 'none'};"/>
                ${shouldPulse && strongestVertex.axis === 'PUTT' ? `<circle cx="${p4[0]}" cy="${p4[1]}" r="8" fill="none" stroke="var(--gold-400)" opacity="0" style="animation: vertex-halo-pulse 2s ease-in-out infinite;"/>` : ''}
                <title>PUTT: ${fmt.num(sgPutt, 2)} (top ${fmt.num(100 - pctPutt, 0)}%)</title>
              </g>
            </svg>
          </div>
          <div class="fingerprint-narrative">
            <p>${narrative}</p>
          </div>
        </div>
      `;
    }

    function buildFingerPrintNarrative(player, sgOtt, sgApp, sgArg, sgPutt, pctOtt, pctApp, pctArg, pctPutt, tourBaselines) {
      const strengths = [];
      const weaknesses = [];

      // Categorize dimensions
      if (pctOtt > 65) strengths.push({ dim: 'driving accuracy', pct: pctOtt, sg: sgOtt });
      else if (pctOtt < 35) weaknesses.push({ dim: 'driving accuracy', pct: pctOtt, sg: sgOtt });

      if (pctApp > 65) strengths.push({ dim: 'approach play', pct: pctApp, sg: sgApp });
      else if (pctApp < 35) weaknesses.push({ dim: 'approach play', pct: pctApp, sg: sgApp });

      if (pctArg > 65) strengths.push({ dim: 'course management', pct: pctArg, sg: sgArg });
      else if (pctArg < 35) weaknesses.push({ dim: 'course management', pct: pctArg, sg: sgArg });

      if (pctPutt > 65) strengths.push({ dim: 'putting', pct: pctPutt, sg: sgPutt });
      else if (pctPutt < 35) weaknesses.push({ dim: 'putting', pct: pctPutt, sg: sgPutt });

      // Build narrative pieces
      let narrative = '';

      if (strengths.length > 0) {
        const topStrength = strengths[0];
        narrative += `Elite ${topStrength.dim} (top ${fmt.num(100 - topStrength.pct, 0)}% on tour).`;
      }

      if (weaknesses.length > 0) {
        const topWeakness = weaknesses[0];
        const impact = Math.abs(topWeakness.sg);
        narrative += ` ${topWeakness.dim.charAt(0).toUpperCase() + topWeakness.dim.slice(1)} runs cold — he gives back roughly ${fmt.num(impact, 2)} strokes per event on the ${topWeakness.dim.includes('putting') ? 'greens' : topWeakness.dim.includes('approach') ? 'approach' : topWeakness.dim.includes('driving') ? 'tee' : 'course'}.`;
      }

      narrative += ' The shape is almost unique on tour.';

      return narrative;
    }

    function getInitials(name) {
      if (!name) return '?';
      const parts = name.split(',').map(p => p.trim());
      if (parts.length >= 2) {
        return (parts[1][0] + parts[0][0]).toUpperCase();
      }
      return name.split(' ').map(p => p[0]).join('').toUpperCase().slice(0, 2);
    }
  </script>
</body>
