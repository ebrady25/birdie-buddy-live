<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DFS Lineups — BirdieBuddy</title>
<meta name="description" content="BBI-optimized DraftKings lineups. Leverage-adjusted, course-fit aware, built for large-field GPPs.">

<style>
  /* ========== VAULT THEME ========== */
  :root {
    --bg: #0a0a0c;
    --bg-2: #111114;
    --bg-3: #16161b;
    --bg-glass: rgba(17,17,20,0.72);
    --text: #f3eedf;
    --text-2: #cfc8b6;
    --text-3: #9a9384;
    --text-4: #5e5849;
    --text-5: #3a352a;
    --border: #1e1c18;
    --border-2: #2a2722;
    --border-gold: #3a3220;
    --gold: #d4a843;
    --gold-2: #e8c878;
    --gold-3: #f3e1a0;
    --gold-soft: rgba(212,168,67,0.12);
    --green: #4ea564;
    --green-soft: rgba(78,165,100,0.12);
    --red: #c45d5d;
    --red-soft: rgba(196,93,93,0.12);
    --purple: #a870d8;
    --purple-soft: rgba(168,112,216,0.12);
    --blue: #6b9bd1;
    --blue-soft: rgba(107,155,209,0.12);
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;

    --s-1: 4px;  --s-2: 8px;  --s-3: 12px; --s-4: 16px;
    --s-5: 20px; --s-6: 24px; --s-8: 32px; --s-10: 40px;
    --s-12: 48px; --s-16: 64px; --s-20: 80px;
    --r-sm: 6px; --r: 10px; --r-lg: 14px;
  }

  * { box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--text); margin: 0; padding: 0; font-family: var(--sans); -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  body { overflow-x: hidden; }
  a { color: inherit; text-decoration: none; }

  /* ---------- NAV ---------- */
  .vault-nav {
    position: sticky; top: 0; z-index: 50;
    display: flex; justify-content: space-between; align-items: center;
    padding: var(--s-5) var(--s-8);
    background: rgba(10,10,12,0.65);
    backdrop-filter: saturate(140%) blur(14px);
    -webkit-backdrop-filter: saturate(140%) blur(14px);
    border-bottom: 1px solid var(--border);
  }
  .vault-nav .brand { font-weight: 800; letter-spacing: -0.02em; font-size: 18px; color: var(--text); }
  .vault-nav .brand span { color: var(--gold); }
  .vault-nav .links { display: flex; gap: var(--s-6); font-size: 13px; color: var(--text-3); }
  .vault-nav .links a { transition: color .25s ease; }
  .vault-nav .links a:hover { color: var(--gold); }

  /* ---------- UTILS ---------- */
  .container { max-width: 1280px; margin: 0 auto; padding: 0 var(--s-6); }
  .section { padding: var(--s-16) var(--s-5); }
  .eyebrow {
    display: inline-block; font-family: var(--mono); font-size: 11px;
    color: var(--gold); letter-spacing: 0.25em; text-transform: uppercase;
    margin-bottom: var(--s-4);
  }
  h1 { font-size: clamp(2rem, 4.2vw, 3rem); font-weight: 800; letter-spacing: -0.035em; line-height: 1.05; margin: 0 0 var(--s-4); }
  h2 { font-size: clamp(1.4rem, 2.6vw, 2rem); font-weight: 700; letter-spacing: -0.02em; margin: 0 0 var(--s-4); }
  .sub { color: var(--text-3); font-size: 15px; line-height: 1.6; margin: 0 0 var(--s-8); max-width: 640px; }

  /* ---------- BADGES ---------- */
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    padding: 5px 10px; border-radius: 999px; border: 1px solid var(--border-2);
  }
  .badge-gold   { background: var(--gold-soft);   color: var(--gold-2); border-color: rgba(212,168,67,0.25); }
  .badge-green  { background: var(--green-soft);  color: var(--green);  border-color: rgba(78,165,100,0.25); }
  .badge-red    { background: var(--red-soft);    color: #e07070;       border-color: rgba(196,93,93,0.25); }
  .badge-purple { background: var(--purple-soft); color: #c490f0;       border-color: rgba(168,112,216,0.25); }
  .badge-blue   { background: var(--blue-soft);   color: #8bb8f0;       border-color: rgba(107,155,209,0.25); }

  /* ---------- KPI STRIP ---------- */
  .kpi-strip {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
    border: 1px solid var(--border); border-radius: var(--r-lg);
    background: linear-gradient(180deg, rgba(22,22,28,0.55), rgba(14,14,18,0.55));
    overflow: hidden; margin-bottom: var(--s-10);
  }
  @media (max-width: 860px) { .kpi-strip { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 480px) { .kpi-strip { grid-template-columns: 1fr; } }
  .kpi-cell { padding: var(--s-6); border-right: 1px solid var(--border); position: relative; }
  .kpi-cell:last-child { border-right: none; }
  @media (max-width: 860px) {
    .kpi-cell:nth-child(2n) { border-right: none; }
    .kpi-cell { border-bottom: 1px solid var(--border); }
  }
  .kpi-num { font-size: clamp(1.6rem, 2.8vw, 2.2rem); font-weight: 800; letter-spacing: -0.03em; color: var(--gold); font-variant-numeric: tabular-nums; }
  .kpi-label { font-family: var(--mono); font-size: 10px; color: var(--text-2); letter-spacing: 0.18em; text-transform: uppercase; margin-top: 6px; }
  .kpi-desc { color: var(--text-4); font-size: 12px; margin-top: 6px; line-height: 1.45; }

  /* ---------- TABLES ---------- */
  .table-wrap { border: 1px solid var(--border); border-radius: var(--r-lg); overflow: hidden; margin-bottom: var(--s-10); }
  .vault-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .vault-table thead { background: var(--bg-2); }
  .vault-table th { font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-3); font-weight: 600; text-align: left; padding: var(--s-3) var(--s-4); border-bottom: 1px solid var(--border); white-space: nowrap; }
  .vault-table td { padding: var(--s-3) var(--s-4); border-bottom: 1px solid var(--border); color: var(--text-2); vertical-align: middle; }
  .vault-table tr:last-child td { border-bottom: none; }
  .vault-table tr:hover td { background: rgba(212,168,67,0.03); }
  .vault-table .num { font-family: var(--mono); font-variant-numeric: tabular-nums; text-align: right; }
  .vault-table .right { text-align: right; }
  .vault-table .tier-SPECIALIST  { color: var(--gold-2); }
  .vault-table .tier-COMFORTABLE { color: var(--green); }
  .vault-table .tier-NEUTRAL     { color: var(--text-3); }
  .vault-table .tier-LIMITED     { color: var(--text-4); }
  .vault-table .tier-NO_HISTORY  { color: var(--text-5); font-style: italic; }
  .bar { display: inline-block; height: 4px; border-radius: 2px; background: var(--gold); vertical-align: middle; margin-right: 6px; }

  /* ---------- LINEUP CARDS ---------- */
  .lineup-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--s-5);
  }
  @media (max-width: 1000px) { .lineup-grid { grid-template-columns: 1fr; } }

  .lineup-card {
    background: linear-gradient(180deg, rgba(22,22,28,0.6), rgba(14,14,18,0.6));
    border: 1px solid var(--border); border-radius: var(--r-lg);
    padding: var(--s-5); position: relative; overflow: hidden;
    transition: border-color .3s ease, transform .3s ease;
  }
  .lineup-card:hover {
    border-color: var(--border-gold);
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(0,0,0,0.35), 0 0 0 1px rgba(212,168,67,0.06);
  }
  .lineup-card::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(800px 180px at 0% 0%, rgba(212,168,67,0.04), transparent 60%);
    pointer-events: none; opacity: 0; transition: opacity .3s;
  }
  .lineup-card:hover::before { opacity: 1; }

  .lineup-head { display: flex; justify-content: space-between; align-items: flex-start; gap: var(--s-3); margin-bottom: var(--s-4); position: relative; z-index: 1; }
  .lineup-title { font-weight: 700; font-size: 15px; color: var(--text); letter-spacing: -0.01em; }
  .lineup-meta { font-family: var(--mono); font-size: 11px; color: var(--text-4); margin-top: 2px; }

  .lineup-kpis {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px;
    background: var(--border); border-radius: var(--r-sm); overflow: hidden;
    margin-bottom: var(--s-4); position: relative; z-index: 1;
  }
  .lineup-kpi { background: var(--bg-2); padding: var(--s-3); display: flex; flex-direction: column; gap: 2px; }
  .lineup-kpi .k-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-4); }
  .lineup-kpi .k-val { font-family: var(--mono); font-weight: 600; font-size: 13px; color: var(--text-2); font-variant-numeric: tabular-nums; }
  .lineup-kpi .k-val.gold { color: var(--gold); }

  .player-rows { display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: var(--r-sm); overflow: hidden; position: relative; z-index: 1; }
  .player-row {
    display: grid; grid-template-columns: 1fr auto auto auto auto;
    align-items: center; gap: var(--s-3);
    padding: 8px 12px; border-bottom: 1px solid var(--border);
    font-size: 13px; background: var(--bg-2);
  }
  .player-row:last-child { border-bottom: none; }
  .player-row .p-name { font-weight: 600; color: var(--text); }
  .player-row .p-salary { font-family: var(--mono); font-size: 12px; color: var(--text-3); }
  .player-row .p-proj  { font-family: var(--mono); font-size: 12px; color: var(--gold-2); }
  .player-row .p-own   { font-family: var(--mono); font-size: 12px; color: var(--text-3); }
  .player-row .p-tier  { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
  .player-row .p-tier.tier-SPECIALIST  { color: var(--gold-2); }
  .player-row .p-tier.tier-COMFORTABLE { color: var(--green); }
  .player-row .p-tier.tier-NEUTRAL     { color: var(--text-3); }
  .player-row .p-tier.tier-LIMITED     { color: var(--text-4); }
  .player-row .p-tier.tier-NO_HISTORY  { color: var(--text-5); }

  /* ---------- LOADING & ERROR ---------- */
  .loading { text-align: center; padding: var(--s-20) var(--s-5); color: var(--text-3); }
  .loading::after { content: ''; display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border-2); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin-left: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { text-align: center; padding: var(--s-20); color: var(--red); }

  /* ---------- FOOTER ---------- */
  .vault-footer {
    display: flex; justify-content: space-between; align-items: center;
    padding: var(--s-8); border-top: 1px solid var(--border);
    color: var(--text-4); font-size: 12px; font-family: var(--mono);
  }

  /* ---------- SCROLLBAR ---------- */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-5); }
</style>
</head>
<body>

<nav class="vault-nav">
  <a href="index.html" class="brand">Birdie<span>Buddy</span></a>
  <div class="links">
    <a href="rankings.html">Rankings</a>
    <a href="lineups.html">DFS</a>
    <a href="performance.html">Performance</a>
    <a href="methodology.html">Methodology</a>
  </div>
</nav>

<main id="app">
  <div class="loading">Loading lineups</div>
</main>

<footer class="vault-footer">
  <span>BirdieBuddy v8.5</span>
  <span id="meta-footer"></span>
</footer>

<script>
/* ================================================================
   DFS LINEUPS — v2.0 Renderer
   Consumes: data/dfs_lineups.json
   ================================================================ */

const ARCHETYPE_STYLES = {
  CASH:     'badge-green',
  CORE:     'badge-blue',
  GPP:      'badge-red',
  MOONSHOT: 'badge-purple',
  Safe:     'badge-green',
  Leverage: 'badge-gold',
  Contrarian:'badge-purple'
};

const TIER_CLASS = tier => 'tier-' + (tier || 'NEUTRAL');

function fmt(n, d=1) {
  if (n == null) return '—';
  return Number(n).toFixed(d);
}

function fmtPct(n, d=1) {
  if (n == null) return '—';
  return Number(n).toFixed(d) + '%';
}

function fmtMoney(n) {
  if (n == null) return '—';
  return '$' + Number(n).toLocaleString();
}

function renderPlayerRow(p) {
  const tier = p.course_tier || p.tier || 'NEUTRAL';
  return `
    <div class="player-row">
      <span class="p-name">${p.name}</span>
      <span class="p-salary">${fmtMoney(p.salary)}</span>
      <span class="p-proj">${fmt(p.adj_proj || p.zeus_dfs || p.proj_total)}</span>
      <span class="p-own">${fmtPct(p.own || p.proj_ownership || p.dk_ownership)}</span>
      <span class="p-tier ${TIER_CLASS(tier)}">${tier.replace('_',' ')}</span>
    </div>
  `;
}

function renderLineupCard(lu, idx) {
  const badgeClass = ARCHETYPE_STYLES[lu.archetype] || 'badge-gold';
  const players = (lu.players || []).map(renderPlayerRow).join('');
  const salary = lu.salary || lu.total_salary || 0;
  const remaining = lu.salary_remaining != null ? lu.salary_remaining : (50000 - salary);
  const proj = lu.proj_total || (lu.players || []).reduce((s,p) => s + (p.adj_proj || p.zeus_dfs || 0), 0);
  const floor = lu.floor_score || (proj * 0.4);
  const ceiling = lu.ceiling_score || (proj * 1.3);
  const avgOwn = lu.avg_own || (lu.players || []).reduce((s,p) => s + (p.own || p.proj_ownership || 0), 0) / (lu.players || []).length;

  return `
    <div class="lineup-card">
      <div class="lineup-head">
        <div>
          <span class="badge ${badgeClass}">${lu.archetype}</span>
          <div class="lineup-title" style="margin-top:6px">Lineup ${idx + 1}</div>
          <div class="lineup-meta">${lu.players ? lu.players.length : 6} players &middot; ${fmtMoney(salary)} &middot; ${fmtPct(avgOwn)} avg own</div>
        </div>
      </div>
      <div class="lineup-kpis">
        <div class="lineup-kpi">
          <span class="k-label">Proj</span>
          <span class="k-val gold">${fmt(proj)}</span>
        </div>
        <div class="lineup-kpi">
          <span class="k-label">Floor</span>
          <span class="k-val">${fmt(floor)}</span>
        </div>
        <div class="lineup-kpi">
          <span class="k-label">Ceiling</span>
          <span class="k-val">${fmt(ceiling)}</span>
        </div>
        <div class="lineup-kpi">
          <span class="k-label">Remaining</span>
          <span class="k-val">${fmtMoney(remaining)}</span>
        </div>
      </div>
      <div class="player-rows">${players}</div>
    </div>
  `;
}

function renderExposureTable(exposure) {
  if (!exposure || !exposure.length) return '';
  const maxExp = Math.max(...exposure.map(e => e.exposure_pct || e.n_lineups || 0));
  const rows = exposure.map(e => {
    const pct = e.exposure_pct || ((e.n_lineups / 12) * 100).toFixed(1);
    const barW = maxExp > 0 ? (pct / maxExp * 60) : 0;
    const tier = e.course_tier || 'NEUTRAL';
    return `
      <tr>
        <td>${e.name}</td>
        <td class="num">${fmtMoney(e.salary)}</td>
        <td class="num">${fmt(e.zeus_dfs || e.adj_proj || 0)}</td>
        <td class="num">${fmtPct(e.own || 0)}</td>
        <td class="num"><span class="bar" style="width:${barW}px"></span>${fmtPct(pct, 1)}</td>
        <td class="num ${TIER_CLASS(tier)}">${tier.replace('_',' ')}</td>
      </tr>
    `;
  }).join('');

  return `
    <div class="section" style="padding-top:0">
      <div class="eyebrow">Portfolio</div>
      <h2>Exposure Table</h2>
      <p class="sub">Where our capital is concentrated across the 12-lineup portfolio.</p>
      <div class="table-wrap">
        <table class="vault-table">
          <thead>
            <tr><th>Player</th><th class="right">Salary</th><th class="right">Proj</th><th class="right">Own</th><th class="right">Exposure</th><th class="right">Course Fit</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
}

function renderKPIs(data) {
  const lineups = data.lineups || [];
  const n = lineups.length;
  const avgProj = n > 0 ? lineups.reduce((s,l) => s + (l.proj_total || 0), 0) / n : 0;
  const avgOwn  = n > 0 ? lineups.reduce((s,l) => s + (l.avg_own || 0), 0) / n : 0;
  const totalSal = n > 0 ? lineups.reduce((s,l) => s + (l.salary || l.total_salary || 0), 0) : 0;
  const capUsed = n > 0 ? (totalSal / (n * 50000) * 100) : 0;

  return `
    <div class="kpi-strip">
      <div class="kpi-cell">
        <div class="kpi-num">${n}</div>
        <div class="kpi-label">Lineups</div>
        <div class="kpi-desc">${data.constraints ? Object.entries(data.constraints.buckets || {}).map(([k,v]) => `${v} ${k}`).join(' / ') : '2 CASH / 5 CORE / 4 GPP / 1 MOONSHOT'}</div>
      </div>
      <div class="kpi-cell">
        <div class="kpi-num">${fmt(capUsed)}%</div>
        <div class="kpi-label">Cap Used</div>
        <div class="kpi-desc">Average salary utilization across portfolio</div>
      </div>
      <div class="kpi-cell">
        <div class="kpi-num">${fmt(avgProj)}</div>
        <div class="kpi-label">Avg Projection</div>
        <div class="kpi-desc">Mean lineup projection (DFS pts)</div>
      </div>
      <div class="kpi-cell">
        <div class="kpi-num">${fmtPct(avgOwn)}</div>
        <div class="kpi-label">Avg Ownership</div>
        <div class="kpi-desc">Portfolio-wide projected ownership</div>
      </div>
    </div>
  `;
}

function renderApp(data) {
  const lineups = data.lineups || [];
  const exposure = data.exposure || [];
  const cards = lineups.map((lu, i) => renderLineupCard(lu, i)).join('');
  const version = data.constructor_version || '1.0';
  const alpha = data.constraints ? data.constraints.gpp_alpha : '0.5';

  document.getElementById('app').innerHTML = `
    <div class="section" style="padding-bottom:var(--s-10)">
      <div class="container">
        <div class="eyebrow">DraftKings Optimizer</div>
        <h1>DFS Lineups</h1>
        <p class="sub">
          BBI-optimized lineups for large-field GPPs. 
          Ownership-leveraged scoring, course-fit aware, built by the v${version} constructor.
        </p>
        ${renderKPIs(data)}
      </div>
    </div>

    ${renderExposureTable(exposure)}

    <div class="section" style="padding-top:0">
      <div class="container">
        <div class="eyebrow">Recommended</div>
        <h2>12-Lineup Portfolio</h2>
        <p class="sub">
          Archetype-optimized builds. CASH targets safe chalk. CORE balances projection and leverage. 
          GPP fades public ownership. MOONSHOT is high-variance punt construction.
        </p>
        <div class="lineup-grid">${cards}</div>
      </div>
    </div>
  `;

  document.getElementById('meta-footer').textContent = 
    `constructor v${version} &middot; α=${alpha} &middot; ${data.generated_at ? new Date(data.generated_at).toLocaleDateString() : ''}`;
}

/* ---------- LOAD DATA ---------- */
async function load() {
  try {
    const res = await fetch('data/dfs_lineups.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    renderApp(data);
  } catch (e) {
    document.getElementById('app').innerHTML = `
      <div class="error">
        <p>Could not load lineup data.</p>
        <p style="color:var(--text-4);font-size:13px;margin-top:8px">${e.message}</p>
      </div>
    `;
  }
}

load();
</script>
</body>
</html>
