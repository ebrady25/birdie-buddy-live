<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Changelog — BirdieBuddy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/design-system.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <style>
    /* ---------- PAGE HEAD ---------- */
    .page-head {
      padding: var(--space-8) 0 var(--space-6);
      border-bottom: 1px solid var(--border-subtle);
    }

    /* ---------- CHANGELOG ENTRY ---------- */
    .changelog-entry {
      padding: var(--space-6) 0;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      gap: var(--space-6);
    }
    .changelog-entry:last-child {
      border-bottom: 0;
    }

    .entry-date {
      font-family: var(--font-mono);
      font-size: var(--fs-xs);
      color: var(--text-muted);
      font-weight: 600;
      letter-spacing: var(--tracking-wide);
      min-width: 100px;
      padding-top: var(--space-1);
    }

    .entry-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .entry-header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .entry-title {
      font-family: var(--font-display);
      font-size: var(--fs-lg);
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      line-height: 1.25;
      flex: 1;
      min-width: 280px;
    }

    .entry-category {
      font-family: var(--font-mono);
      font-size: var(--fs-3xs);
      font-weight: 700;
      letter-spacing: var(--tracking-wider);
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: var(--radius-sm);
      white-space: nowrap;
    }

    .category-model {
      background: rgba(96, 165, 250, 0.15);
      color: var(--info);
      border: 1px solid rgba(96, 165, 250, 0.25);
    }

    .category-site {
      background: rgba(212, 168, 67, 0.15);
      color: var(--gold-300);
      border: 1px solid var(--border-gold);
    }

    .category-content {
      background: rgba(74, 222, 128, 0.15);
      color: var(--positive);
      border: 1px solid rgba(74, 222, 128, 0.25);
    }

    .category-infra {
      background: rgba(139, 92, 246, 0.15);
      color: #a78bfa;
      border: 1px solid rgba(139, 92, 246, 0.25);
    }

    .category-planning {
      background: rgba(248, 113, 113, 0.15);
      color: var(--negative);
      border: 1px solid rgba(248, 113, 113, 0.25);
    }

    .entry-summary {
      font-size: var(--fs-sm);
      color: var(--text-body);
      line-height: 1.6;
      max-width: 72ch;
    }

    /* ---------- RESPONSIVE ---------- */
    @media (max-width: 640px) {
      .changelog-entry {
        flex-direction: column;
        gap: var(--space-4);
      }
      .entry-date {
        min-width: auto;
      }
      .entry-header {
        flex-direction: column;
        align-items: flex-start;
      }
      .entry-title {
        min-width: auto;
      }
    }

    /* ---------- EMPTY STATE ---------- */
    .empty-state {
      padding: var(--space-8);
      text-align: center;
      color: var(--text-muted);
    }

    .empty-state p {
      font-size: var(--fs-sm);
      line-height: 1.6;
      margin-top: var(--space-2);
    }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="container">
    <!-- PAGE HEAD -->
    <section class="page-head">
      <div class="eyebrow">
        <span class="eyebrow-dot"></span>
        <span>PROJECT CREDIBILITY</span>
      </div>
      <h1>Changelog</h1>
      <p>Every ship, every day. This is the permanent receipt of improvements, fixes, and feature launches to the BirdieBuddy system.</p>
    </section>

    <!-- CHANGELOG ENTRIES -->
    <div id="changelogEntries"></div>

    <!-- EMPTY STATE (fallback) -->
    <div id="emptyState" class="empty-state" style="display: none;">
      <p>No changelog entries yet.</p>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="assets/js/core.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/animations.js"></script>
  <script src="assets/js/data.js"></script>
  <script>
    const CATEGORY_COLORS = {
      model:     { badge: 'category-model' },
      site:      { badge: 'category-site' },
      content:   { badge: 'category-content' },
      infra:     { badge: 'category-infra' },
      planning:  { badge: 'category-planning' }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await BBI.renderHeader('changelog.html');
      await BBI.renderFooter();

      const data = await BBI.data.load(BBI.data.paths.changelog);
      const container = $('#changelogEntries');
      const empty = $('#emptyState');

      if (!data || !data.entries || data.entries.length === 0) {
        if (container) container.style.display = 'none';
        if (empty) empty.style.display = 'block';
        return;
      }

      // Sort by date descending (newest first)
      const sorted = [...data.entries].sort((a, b) => new Date(b.date) - new Date(a.date));

      // Group by date
      const byDate = {};
      sorted.forEach(entry => {
        const date = entry.date;
        if (!byDate[date]) byDate[date] = [];
        byDate[date].push(entry);
      });

      // Render each date group
      const html = Object.entries(byDate).map(([date, entries]) => {
        const dateObj = new Date(date);
        const dateStr = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

        return entries.map(entry => {
          const catConfig = CATEGORY_COLORS[entry.category] || CATEGORY_COLORS.site;
          return `
            <div class="changelog-entry">
              <div class="entry-date">${dateStr}</div>
              <div class="entry-content">
                <div class="entry-header">
                  <div class="entry-title">${entry.title}</div>
                  <span class="entry-category ${catConfig.badge}">${entry.category}</span>
                </div>
                <div class="entry-summary">${entry.summary}</div>
              </div>
            </div>
          `;
        }).join('');
      }).join('');

      if (container) container.innerHTML = html;
    });
  </script>
</body>
</html>
